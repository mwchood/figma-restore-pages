<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Test Preheat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section
        class="figma-frame typhur-test-preheat-frame"
        data-figma-id="23:2102"
        data-figma-file-key="H9GTGgnI0rzfnrKSt1Hlui"
        data-figma-frame-width="750"
        data-figma-frame-height="1624"
        data-render-scale="0.5"
        data-figma-name="Preheat"
      >
        <section class="ty-schedule-status" data-figma-id="23:2103" data-figma-name="System bar">
          <img class="ty-schedule-time" data-figma-id="23:2123" src="./assets/typhur-preheat-status-time-23-2123.svg" alt="" />
          <img class="ty-schedule-status-right" data-figma-id="23:2106" src="./assets/typhur-preheat-status-right-23-2106.svg" alt="" />
        </section>

        <header class="ty-schedule-nav" data-figma-id="23:2125" data-figma-name="Navigation bar/Light">
          <img class="ty-schedule-back" src="./assets/typhur-preheat-back-23-2125.svg" alt="" />
          <h1>Typhur Sous Vide Station</h1>
          <img class="ty-schedule-settings" src="./assets/typhur-preheat-settings-23-2125.svg" alt="" />
        </header>

        <section class="ty-preheat-title" data-figma-id="23:2133" data-figma-name="Title">
          <img data-figma-id="23:2134" src="./assets/typhur-preheat-temperature-23-2134.svg" alt="" />
          <h2 data-figma-id="23:2144">Preheating</h2>
        </section>

        <section class="ty-preheat-temp" data-figma-id="23:2126" data-figma-name="Temp">
          <img class="ty-preheat-ring-base" data-figma-id="23:2127" src="./assets/typhur-preheat-ring-base-23-2127.svg" alt="" />
          <img class="ty-preheat-ring-left" data-figma-id="23:2128" src="./assets/typhur-preheat-ring-left-23-2128.svg" alt="" />
          <img class="ty-preheat-ring-progress" data-figma-id="23:2129" src="./assets/typhur-preheat-ring-progress-23-2129.svg" alt="" />
          <strong data-figma-id="23:2130">92.0</strong>
          <span class="ty-preheat-unit" data-figma-id="23:2131">°F</span>
          <span class="ty-preheat-label" data-figma-id="23:2132">Current Temp</span>
        </section>

        <section class="ty-schedule-list" data-figma-id="23:2145" data-figma-name="List">
          <article class="ty-schedule-row" data-figma-id="23:2146">
            <span class="ty-schedule-row-label">Target Temp</span>
            <span class="ty-schedule-row-value">190°F</span>
            <img src="./assets/typhur-preheat-arrow-23-2146.svg" alt="" />
          </article>
          <article class="ty-schedule-row" data-figma-id="23:2147">
            <span class="ty-schedule-row-label">Cooking Time</span>
            <span class="ty-schedule-row-value">02h 30min</span>
            <img src="./assets/typhur-preheat-arrow-23-2146.svg" alt="" />
          </article>
        </section>

        <button class="ty-schedule-stop" data-figma-id="23:2148" type="button">Stop</button>
      </section>
    </main>
  </body>
</html>
