<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Test Schedule</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section
        class="figma-frame typhur-test-schedule-frame"
        data-figma-id="18:2025"
        data-figma-file-key="H9GTGgnI0rzfnrKSt1Hlui"
        data-figma-frame-width="750"
        data-figma-frame-height="1624"
        data-render-scale="0.5"
        data-figma-name="Schedule"
      >
        <section class="ty-schedule-status" data-figma-id="18:2026" data-figma-name="System bar">
          <img class="ty-schedule-time" data-figma-id="18:2046" src="./assets/typhur-schedule-status-time-18-2046.svg" alt="" />
          <img class="ty-schedule-status-right" data-figma-id="18:2029" src="./assets/typhur-schedule-status-right-18-2029.svg" alt="" />
        </section>

        <header class="ty-schedule-nav" data-figma-id="18:2048" data-figma-name="Navigation bar/Light">
          <img class="ty-schedule-back" src="./assets/typhur-schedule-back-18-2048.svg" alt="" />
          <h1>Typhur Sous Vide..</h1>
          <img class="ty-schedule-settings" src="./assets/typhur-schedule-settings-18-2048.svg" alt="" />
        </header>

        <section class="ty-schedule-title" data-figma-id="18:2049" data-figma-name="Title">
          <img data-figma-id="18:2050" src="./assets/typhur-schedule-title-18-2050.svg" alt="" />
          <h2 data-figma-id="18:2057">Cooking</h2>
        </section>

        <section class="ty-schedule-temp" data-figma-id="18:2063" data-figma-name="Temp">
          <img class="ty-schedule-ring-base" data-figma-id="18:2064" src="./assets/typhur-schedule-ring-base-18-2064.svg" alt="" />
          <img class="ty-schedule-ring-red" data-figma-id="18:2065" src="./assets/typhur-schedule-ring-red-18-2065.svg" alt="" />
          <img class="ty-schedule-ring-blue" data-figma-id="18:2066" src="./assets/typhur-schedule-ring-blue-18-2066.svg" alt="" />
          <img class="ty-schedule-ring-pink" data-figma-id="18:2067" src="./assets/typhur-schedule-ring-pink-18-2067.svg" alt="" />
          <strong data-figma-id="18:2068">2:30:00</strong>
          <span data-figma-id="18:2069">Remaining Time</span>
        </section>

        <p class="ty-schedule-current" data-figma-id="18:2062">Current 190°F · Ready at 2:00 PM Today</p>

        <section class="ty-schedule-list" data-figma-id="18:2059" data-figma-name="List">
          <article class="ty-schedule-row" data-figma-id="18:2060">
            <span class="ty-schedule-row-label">Target Temp</span>
            <span class="ty-schedule-row-value">190°F</span>
            <img src="./assets/typhur-schedule-arrow-18-2060.svg" alt="" />
          </article>
          <article class="ty-schedule-row" data-figma-id="18:2061">
            <span class="ty-schedule-row-label">Cooking Time</span>
            <span class="ty-schedule-row-value">02h 30min</span>
            <img src="./assets/typhur-schedule-arrow-18-2060.svg" alt="" />
          </article>
        </section>

        <button class="ty-schedule-stop" data-figma-id="18:2058" type="button">Stop</button>
      </section>
    </main>
  </body>
</html>
