<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Share Cooking</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="figma-frame typhur-frame typhur-share-frame" data-figma-id="85:10235" data-figma-frame-width="750" data-figma-frame-height="1624" data-render-scale="0.5" data-figma-name="Share Cooking">
        <section class="share-status" data-figma-id="85:10238" data-figma-name="StatusBar">
          <img class="share-time ty-figma-svg" data-figma-id="I85:10238;6944:69314" src="./assets/typhur-share-status-time-85-10238.svg" alt="" />
          <img class="share-status-right ty-figma-svg" data-figma-id="I85:10238;6944:69297" src="./assets/typhur-share-status-right-85-10238.svg" alt="" />
        </section>

        <header class="share-nav" data-figma-id="85:10237" data-figma-name="Navigation bar/Light">
          <img class="share-close ty-figma-svg" data-figma-id="I85:10237;473:3489" src="./assets/typhur-share-close-85-10237.svg" alt="" />
        </header>

        <section class="share-card" data-figma-id="85:10247" data-figma-name="曲线分享">
          <img class="share-card-art ty-figma-svg" data-figma-id="85:10247" src="./assets/typhur-share-card-85-10247.svg" alt="" />
        </section>

        <p class="share-video-label" data-figma-id="85:10248">视频区域</p>

        <section class="share-content" data-figma-id="85:10249" data-figma-name="Content">
          <h1 data-figma-id="85:10250">Share your cooking!</h1>
          <p class="lead" data-figma-id="85:10251">Create a video of your cooking and share it with your friends or on social media!</p>
          <p class="note" data-figma-id="85:10252">You can share this cooking later in your cooking history</p>
        </section>

        <section class="share-bottom" data-figma-id="85:10239" data-figma-name="Bottom">
          <label class="share-checkbox" data-figma-id="85:10242">
            <span data-figma-id="85:10244"></span>
            <em data-figma-id="85:10245">Don&rsquo;t show this again</em>
          </label>
          <button class="share-primary" data-figma-id="85:10241" type="button">Share Now</button>
        </section>
      </section>
    </main>
  </body>
</html>
