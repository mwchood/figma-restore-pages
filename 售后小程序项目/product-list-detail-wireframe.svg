<svg width="860" height="920" viewBox="0 0 860 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #eef1f5; }
    .phone { fill: #f9f9f9; stroke: #d9dde3; stroke-width: 1; }
    .bar { fill: #ffffff; }
    .card { fill: #ffffff; stroke: #d8d8d8; stroke-width: 1; }
    .thumb { fill: #f2f3f5; stroke: #dbdbdb; stroke-width: 1; }
    .line { stroke: #d8d8d8; stroke-width: 1; }
    .dash { stroke: #c9c9c9; stroke-width: 1; stroke-dasharray: 5 5; }
    .ink { fill: #111111; }
    .muted { fill: #777777; }
    .weak { fill: #999999; }
    .btn { fill: #111111; }
    .outline { fill: #ffffff; stroke: #111111; stroke-width: 1; }
    .h1 { font: 500 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    .h2 { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    .body { font: 400 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    .small { font: 400 12px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    .micro { font: 400 10px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    .label { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
  </style>

  <rect class="bg" width="860" height="920"/>
  <text class="h1 ink" x="52" y="44">全部产品列表页 / 产品详情页低保真线框图</text>
  <text class="small muted" x="52" y="70">依据：Product Summary Card、Info List、More Function List、Bottom CTA Bar；仅确认结构，不表达最终视觉。</text>

  <!-- Product list page -->
  <g transform="translate(52 96)">
    <text class="h2 ink" x="0" y="-20">1. 全部产品列表页</text>
    <rect class="phone" x="0" y="0" width="375" height="812" rx="18"/>
    <rect class="bar" x="1" y="1" width="373" height="88" rx="18"/>
    <text class="small ink" x="24" y="32">9:41</text>
    <path d="M31 62L23 70L31 78" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="h1 ink" x="132" y="70">全部产品</text>
    <rect x="274" y="50" width="84" height="32" rx="16" fill="#f9f9f9" stroke="#f0f0f0"/>
    <circle cx="334" cy="66" r="9" stroke="#777" stroke-width="1.5"/>
    <circle cx="302" cy="66" r="2" fill="#777"/>
    <circle cx="310" cy="66" r="2" fill="#777"/>
    <circle cx="318" cy="66" r="2" fill="#777"/>

    <text class="small muted" x="20" y="126">共 2 个产品</text>
    <text class="small ink" x="291" y="126">注册产品</text>
    <path d="M350 119L356 125L350 131" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(20 146)">
      <rect class="card" x="0" y="0" width="335" height="112" rx="6"/>
      <rect class="thumb" x="16" y="16" width="80" height="80" rx="6"/>
      <rect x="47" y="31" width="18" height="45" rx="7" fill="#e5e9ec" stroke="#cfd7dd"/>
      <line x1="113" y1="27" x2="196" y2="27" class="line"/>
      <text class="body ink" x="112" y="50">净水器 X1</text>
      <text class="small weak" x="112" y="76">SN：SN-OK-001</text>
      <text class="small weak" x="112" y="96">保修期至：2027-10-23</text>
      <path d="M314 51L320 57L314 63" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(20 274)">
      <rect class="card" x="0" y="0" width="335" height="112" rx="6"/>
      <rect class="thumb" x="16" y="16" width="80" height="80" rx="6"/>
      <path d="M47 25V80" stroke="#cfd7dd" stroke-width="6" stroke-linecap="round"/>
      <path d="M64 25V80" stroke="#cfd7dd" stroke-width="6" stroke-linecap="round"/>
      <text class="body ink" x="112" y="50">焦点触控笔</text>
      <text class="small weak" x="112" y="76">SN：SN-OK-002</text>
      <text class="small weak" x="112" y="96">保修期至：2026-12-07</text>
      <path d="M314 51L320 57L314 63" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(20 418)">
      <rect class="card" x="0" y="0" width="335" height="96" rx="6"/>
      <text class="body ink" x="129" y="39">注册产品</text>
      <text class="small weak" x="102" y="65">绑定后可享受售后服务</text>
      <line x1="0" y1="116" x2="335" y2="116" class="dash"/>
      <text class="micro weak" x="0" y="144">空状态：仅显示这一张注册产品入口卡。</text>
    </g>

    <text class="micro weak" x="20" y="760">交互：点击产品卡进入产品详情；点击注册产品进入注册流程。</text>
  </g>

  <!-- Product detail page -->
  <g transform="translate(474 96)">
    <text class="h2 ink" x="0" y="-20">2. 产品详情页</text>
    <rect class="phone" x="0" y="0" width="375" height="812" rx="18"/>
    <rect class="bar" x="1" y="1" width="373" height="88" rx="18"/>
    <text class="small ink" x="24" y="32">9:41</text>
    <path d="M31 62L23 70L31 78" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="h1 ink" x="137" y="70">产品详情</text>
    <rect x="274" y="50" width="84" height="32" rx="16" fill="#f9f9f9" stroke="#f0f0f0"/>
    <circle cx="334" cy="66" r="9" stroke="#777" stroke-width="1.5"/>
    <circle cx="302" cy="66" r="2" fill="#777"/>
    <circle cx="310" cy="66" r="2" fill="#777"/>
    <circle cx="318" cy="66" r="2" fill="#777"/>

    <g transform="translate(20 112)">
      <rect class="card" x="0" y="0" width="335" height="128" rx="6"/>
      <rect class="thumb" x="16" y="20" width="88" height="88" rx="6"/>
      <rect x="50" y="36" width="20" height="52" rx="8" fill="#e5e9ec" stroke="#cfd7dd"/>
      <text class="h2 ink" x="124" y="42">净水器 X1</text>
      <text class="small weak" x="124" y="70">SN：SN-OK-001</text>
      <text class="small weak" x="124" y="94">保修期至：2027-10-23</text>
      <rect class="outline" x="124" y="104" width="72" height="22" rx="11"/>
      <text class="micro ink" x="142" y="119">保修中</text>
    </g>

    <g transform="translate(20 264)">
      <text class="h2 ink" x="0" y="0">产品资料</text>
      <rect class="card" x="0" y="16" width="335" height="216" rx="6"/>
      <text class="label muted" x="16" y="50">购买渠道</text>
      <text class="label ink" x="252" y="50">淘宝</text>
      <line class="line" x1="16" y1="70" x2="319" y2="70"/>
      <text class="label muted" x="16" y="104">订单号</text>
      <text class="label ink" x="196" y="104">TB202607100001</text>
      <line class="line" x1="16" y1="124" x2="319" y2="124"/>
      <text class="label muted" x="16" y="158">注册时间</text>
      <text class="label ink" x="220" y="158">2026-07-10</text>
      <line class="line" x1="16" y1="178" x2="319" y2="178"/>
      <text class="label muted" x="16" y="212">保修期</text>
      <text class="label ink" x="176" y="212">2026-07-10 至 2027-10-23</text>
    </g>

    <g transform="translate(20 524)">
      <text class="h2 ink" x="0" y="0">产品服务</text>
      <rect class="card" x="0" y="16" width="335" height="216" rx="6"/>
      <text class="body ink" x="16" y="51">售后服务申请</text>
      <path d="M314 40L320 46L314 52" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line class="line" x1="16" y1="70" x2="319" y2="70"/>
      <text class="body ink" x="16" y="105">售后服务记录</text>
      <path d="M314 94L320 100L314 106" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line class="line" x1="16" y1="124" x2="319" y2="124"/>
      <text class="body ink" x="16" y="159">申请开票</text>
      <path d="M314 148L320 154L314 160" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line class="line" x1="16" y1="178" x2="319" y2="178"/>
      <text class="body ink" x="16" y="213">产品知识</text>
      <path d="M314 202L320 208L314 214" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(0 724)">
      <rect class="bar" x="0" y="0" width="375" height="88"/>
      <rect class="btn" x="20" y="12" width="335" height="48" rx="24"/>
      <text class="body" x="144" y="42" fill="#ffffff">申请售后服务</text>
      <rect x="121" y="75" width="134" height="5" rx="2.5" fill="#111"/>
    </g>
  </g>
</svg>
