<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="980" viewBox="0 0 1420 980">
  <defs>
    <style>
      .bg{fill:#e7ebf0}.shell{fill:#111;filter:url(#shadow)}.screen{fill:#f9f9f9}
      .white{fill:#fff}.pale{fill:#f9f9f9}.line{stroke:#f0f0f0;stroke-width:1}
      .ink{fill:#000;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .gray{fill:#666;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .muted{fill:#999;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .orange{fill:#ed6319}.whiteText{fill:#fff;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .h0{font-size:26px;font-weight:600}.h1{font-size:20px;font-weight:500}.h2{font-size:18px;font-weight:500}
      .h3{font-size:16px;font-weight:500}.body{font-size:14px;font-weight:400}.small{font-size:12px;font-weight:300}.mini{font-size:10px;font-weight:300}
      .stroke{stroke:#000;stroke-width:1.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .strokeG{stroke:#999;stroke-width:1.1;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .strokeO{stroke:#ed6319;stroke-width:1.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#1d2632" flood-opacity=".18"/>
    </filter>
    <linearGradient id="device" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/><stop offset=".55" stop-color="#edf1f4"/><stop offset="1" stop-color="#cfd7de"/>
    </linearGradient>
    <linearGradient id="serviceTopFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9eef4"/><stop offset="1" stop-color="#f9f9f9"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1420" height="980"/>
  <text class="ink h0" x="60" y="58">重新按母版做的首页方向</text>
  <text class="gray body" x="60" y="86">这版不再另起风格，每个方案都明确从今天还原的页面里借结构、图像或组件。</text>

