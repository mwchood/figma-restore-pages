<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="980" viewBox="0 0 1120 980">
  <defs>
    <style>
      .canvas { fill: #e7ebf0; }
      .phone-shell { fill: #111; }
      .screen { fill: #f9f9f9; }
      .top-bg { fill: url(#topGradient); }
      .card { fill: #fff; }
      .soft-card { fill: #f6f7f8; }
      .line { stroke: #f0f0f0; stroke-width: 1; }
      .hairline { stroke: rgba(0,0,0,.08); stroke-width: 1; }
      .dark { fill: #000; font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .gray { fill: #666; font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .muted { fill: #999; font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .orange { fill: #ed6319; font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .whiteText { fill: #fff; font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .title { font-size: 24px; font-weight: 600; }
      .caption { font-size: 13px; font-weight: 300; }
      .page-title { font-size: 22px; font-weight: 500; }
      .section-title { font-size: 16px; font-weight: 500; }
      .body { font-size: 14px; font-weight: 400; }
      .body-light { font-size: 14px; font-weight: 300; }
      .small { font-size: 12px; font-weight: 300; }
      .mini { font-size: 10px; font-weight: 300; }
      .tab { font-size: 10px; font-weight: 400; }
      .btn { font-size: 12px; font-weight: 400; }
      .stroke-black { stroke: #000; stroke-width: 1.3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-gray { stroke: #999; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-orange { stroke: #ed6319; stroke-width: 1.35; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .shadow { filter: url(#phoneShadow); }
