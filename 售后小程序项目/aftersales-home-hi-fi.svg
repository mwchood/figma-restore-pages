    <linearGradient id="topGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f5"/>
      <stop offset=".58" stop-color="#f3f5f7"/>
      <stop offset="1" stop-color="#f9f9f9"/>
    </linearGradient>
    <linearGradient id="productGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcfcfc"/>
      <stop offset=".55" stop-color="#edf0f3"/>
      <stop offset="1" stop-color="#dfe4e8"/>
    </linearGradient>
    <linearGradient id="orangeSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3eb"/>
      <stop offset="1" stop-color="#ffe4d3"/>
    </linearGradient>
    <filter id="phoneShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#1d2632" flood-opacity=".18"/>
    </filter>
    <clipPath id="leftScreenClip" clipPathUnits="objectBoundingBox">
