<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980">
  <defs>
    <style>
      .canvas{fill:#e7ebf0}
      .phone{fill:#fff;stroke:#d7dce2;stroke-width:1.2;filter:url(#shadow)}
      .screen{fill:#f9f9f9}
      .bar{fill:#fff}
      .card{fill:#fff;stroke:#dbdbdb;stroke-width:1}
      .field{fill:#fff;stroke:#dbdbdb;stroke-width:1}
      .placeholder{fill:#f0f0f0}
      .button{fill:#000}
      .button-line{fill:#fff;stroke:#000;stroke-width:1}
      .line{stroke:#f0f0f0;stroke-width:1}
      .arrow{stroke:#999;stroke-width:1.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .accent{stroke:#ed6319;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .ink{fill:#000;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .gray{fill:#666;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .muted{fill:#999;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .inverse{fill:#fff;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .title{font-size:26px;font-weight:500}
      .h1{font-size:20px;font-weight:500}
      .h2{font-size:18px;font-weight:500}
      .h3{font-size:14px;font-weight:400}
      .body{font-size:12px;font-weight:300}
      .small{font-size:10px;font-weight:300}
      .chip{font-size:12px;font-weight:400}
    </style>
    <filter id="shadow" x="-12%" y="-10%" width="124%" height="126%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1d2632" flood-opacity=".14"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1l8 4-8 4" fill="none" stroke="#999" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="canvas" width="1680" height="980"/>
  <text class="ink title" x="60" y="62">注册产品流程线框图</text>
  <text class="gray body" x="60" y="90">流程：首页注册入口 → 注册产品表单页（渠道 + 订单号 + SN + 帮助入口）→ 扫码 SN → 注册成功 → 首页已注册产品态</text>

  <!-- Screen 1 -->
  <g transform="translate(60 140)">
    <text class="ink h2" x="0" y="-20">1. 首页未注册态</text>
    <rect class="phone" width="260" height="564" rx="24"/>
    <g transform="translate(0 0)">
      <rect class="screen" x="0" y="0" width="260" height="564" rx="24"/>
      <rect class="placeholder" x="0" y="0" width="260" height="150" rx="24"/>
      <text class="ink body" x="18" y="26">9:41</text>
      <text class="inverse h1" x="20" y="82">售后与支持</text>
      <text class="inverse body" x="20" y="108">产品服务 / 进度 / 开票</text>

      <g transform="translate(18 176)">
        <text class="ink h2" x="0" y="0">我的产品</text>
        <text class="gray body" x="144" y="0">查看全部产品</text>
        <rect class="card" x="0" y="24" width="224" height="94" rx="6"/>
        <rect class="button" x="66" y="50" width="92" height="34" rx="17"/>
        <text class="inverse h3" x="86" y="72">注册产品</text>
        <text class="muted body" x="56" y="102">注册产品享受更多服务</text>
      </g>

      <g transform="translate(18 338)">
        <text class="ink h2" x="0" y="0">自助服务</text>
        <rect class="card" x="0" y="24" width="104" height="68" rx="6"/>
        <rect class="card" x="120" y="24" width="104" height="68" rx="6"/>
        <rect class="card" x="0" y="106" width="104" height="68" rx="6"/>
        <rect class="card" x="120" y="106" width="104" height="68" rx="6"/>
      </g>

      <rect class="bar" x="0" y="500" width="260" height="64"/>
      <line class="line" x1="0" y1="500" x2="260" y2="500"/>
      <text class="ink small" x="48" y="540">首页</text>
      <text class="muted small" x="112" y="540">会员中心</text>
      <text class="muted small" x="200" y="540">我的</text>
    </g>
  </g>

  <path class="arrow" marker-end="url(#arrowHead)" d="M334 410h62"/>

  <!-- Screen 2 -->
  <g transform="translate(410 140)">
    <text class="ink h2" x="0" y="-20">2. 注册产品表单页</text>
    <rect class="phone" width="260" height="564" rx="24"/>
    <rect class="screen" x="0" y="0" width="260" height="564" rx="24"/>
    <rect class="bar" x="0" y="0" width="260" height="88" rx="24"/>
    <text class="ink body" x="18" y="26">9:41</text>
    <path class="arrow" d="M20 62l-6 6 6 6"/>
    <text class="ink h2" x="82" y="70">注册产品</text>

    <g transform="translate(18 112)">
      <text class="ink h3" x="0" y="0">购买渠道</text>
      <g transform="translate(0 20)">
        <rect class="button" x="0" y="0" width="46" height="30" rx="15"/>
        <text class="inverse chip" x="11" y="20">淘宝</text>
        <rect class="button-line" x="52" y="0" width="46" height="30" rx="15"/>
        <text class="ink chip" x="63" y="20">京东</text>
        <rect class="button-line" x="104" y="0" width="46" height="30" rx="15"/>
        <text class="ink chip" x="115" y="20">抖音</text>
        <rect class="button-line" x="156" y="0" width="56" height="30" rx="15"/>
        <text class="ink chip" x="166" y="20">拼多多</text>
        <rect class="button-line" x="0" y="38" width="46" height="30" rx="15"/>
        <text class="ink chip" x="11" y="58">其他</text>
      </g>
    </g>

    <g transform="translate(18 222)">
      <text class="ink h3" x="0" y="0">订单号</text>
      <text class="muted small" x="142" y="0">如何查看订单号？</text>
      <rect class="field" x="0" y="16" width="224" height="48" rx="6"/>
      <text class="muted body" x="14" y="47">请输入购买渠道订单号</text>
    </g>

    <g transform="translate(18 306)">
      <text class="ink h3" x="0" y="0">SN 码</text>
      <text class="muted small" x="160" y="0">如何查看 SN？</text>
      <rect class="field" x="0" y="16" width="224" height="48" rx="6"/>
      <text class="muted body" x="14" y="47">请输入或扫码识别 SN</text>
      <rect class="button-line" x="170" y="24" width="42" height="32" rx="16"/>
      <text class="ink small" x="182" y="45">扫码</text>
    </g>

    <g transform="translate(18 412)">
      <rect class="button" x="0" y="0" width="224" height="46" rx="23"/>
      <text class="inverse h3" x="84" y="30">提交注册</text>
      <text class="muted body" x="24" y="70">帮助入口点击后在当前页展开说明</text>
    </g>
  </g>

  <path class="arrow" marker-end="url(#arrowHead)" d="M684 410h62"/>

  <!-- Screen 3 -->
  <g transform="translate(760 140)">
    <text class="ink h2" x="0" y="-20">3. 扫码 SN 状态</text>
    <rect class="phone" width="260" height="564" rx="24"/>
    <rect class="screen" x="0" y="0" width="260" height="564" rx="24"/>
    <rect fill="#111" x="0" y="0" width="260" height="564" rx="24" opacity=".92"/>
    <text class="inverse body" x="18" y="26">9:41</text>
    <path class="arrow" d="M20 62l-6 6 6 6" stroke="#fff"/>
    <text class="inverse h2" x="90" y="70">扫描 SN</text>
    <rect x="46" y="158" width="168" height="168" rx="8" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M64 188v-16h16M180 172h16v16M196 296v16h-16M80 312H64v-16" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="62" y1="242" x2="198" y2="242" stroke="#ed6319" stroke-width="2"/>
    <text class="inverse h3" x="58" y="370">请将 SN 条码放入框内</text>
    <text class="inverse body" x="56" y="396" opacity=".68">无法扫码时，可返回手动输入</text>
    <rect x="54" y="452" width="152" height="38" rx="19" fill="#fff"/>
    <text class="ink h3" x="91" y="477">手动输入</text>
  </g>

  <path class="arrow" marker-end="url(#arrowHead)" d="M1034 410h62"/>

  <!-- Screen 4 -->
  <g transform="translate(1110 140)">
    <text class="ink h2" x="0" y="-20">4. 注册成功</text>
    <rect class="phone" width="260" height="564" rx="24"/>
    <rect class="screen" x="0" y="0" width="260" height="564" rx="24"/>
    <rect class="bar" x="0" y="0" width="260" height="88" rx="24"/>
    <text class="ink body" x="18" y="26">9:41</text>
    <text class="ink h2" x="90" y="70">注册成功</text>

    <g transform="translate(48 138)">
      <circle cx="82" cy="82" r="54" fill="#fff" stroke="#dbdbdb"/>
      <path class="accent" d="M56 84l18 18 36-42"/>
      <text class="ink h2" x="42" y="164">产品注册成功</text>
      <text class="muted body" x="30" y="192">已添加到「我的产品」</text>
    </g>

    <g transform="translate(18 390)">
      <rect class="button" x="0" y="0" width="224" height="46" rx="23"/>
      <text class="inverse h3" x="78" y="30">返回首页</text>
      <rect class="button-line" x="0" y="62" width="224" height="46" rx="23"/>
      <text class="ink h3" x="78" y="92">查看产品</text>
    </g>
  </g>

  <path class="arrow" marker-end="url(#arrowHead)" d="M1240 718v72H188v-58"/>

  <!-- Screen 5 -->
  <g transform="translate(60 764)">
    <text class="ink h2" x="0" y="-20">5. 首页已注册产品态（局部）</text>
    <rect class="card" x="0" y="0" width="610" height="120" rx="8"/>
    <text class="ink h2" x="24" y="36">我的产品</text>
    <text class="gray body" x="500" y="36">查看全部产品</text>
    <rect class="placeholder" x="24" y="56" width="68" height="48" rx="5"/>
    <text class="ink h3" x="112" y="76">净水器 X1</text>
    <text class="muted body" x="112" y="98">SN：A1B2C3D4</text>
    <text class="muted body" x="340" y="76">保修期</text>
    <text class="ink h3" x="340" y="100">至 2027-10-23</text>
  </g>

  <g transform="translate(720 764)">
    <rect class="card" x="0" y="0" width="560" height="120" rx="8"/>
    <text class="ink h2" x="24" y="36">待确认规则</text>
    <text class="gray body" x="24" y="66">渠道列表：淘宝 / 京东 / 抖音 / 拼多多 / 其他</text>
    <text class="gray body" x="24" y="92">产品卡字段：产品名、SN、保修期；不放查看详情按钮</text>
  </g>
</svg>
