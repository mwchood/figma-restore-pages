<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>售后小程序 - 产品详情</title>
    <link rel="stylesheet" href="./product.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="miniapp-frame" aria-label="产品详情">
        <header class="page-header">
          <span class="status-time">9:41</span>
          <a class="back-link" href="./products.html" aria-label="返回全部产品" data-back></a>
          <h1 class="page-title">产品详情</h1>
          <span class="mini-capsule" aria-hidden="true"></span>
        </header>

        <section class="page-content detail-content">
          <section class="asset-hero">
            <h2 data-product-name>净水器 X1</h2>
            <p data-product-days>已陪伴您 42 天</p>
            <div class="asset-hero__meta">
              <span data-product-sn>SN-OK-001</span>
            </div>
            <span class="product-thumb" data-product-thumb></span>
          </section>

          <section class="warranty-card" aria-label="电子保修卡">
            <div class="warranty-card__head">
              <h3>电子保修卡</h3>
              <span class="warranty-tag" data-warranty-status>保修中</span>
            </div>
            <p class="warranty-card__date" data-warranty-date>保修期至 2027-10-23</p>
            <a class="warranty-link" href="#">保修详情</a>

            <div class="warranty-card__fields">
              <div class="copy-row">
                <span>SN</span>
                <span data-copy-sn>SN-OK-001</span>
                <button type="button" data-copy="sn">复制</button>
              </div>
              <div class="copy-row">
                <span>订单号</span>
                <span data-copy-order>TB202607100001</span>
                <button type="button" data-copy="order">复制</button>
              </div>
            </div>
          </section>

          <nav class="quick-services" aria-label="产品服务">
            <a href="#" data-after-sales-link>
              <span class="service-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M7 4.5h10v15H7z"></path>
                  <path d="M10 9h5M10 12.5h5M10 16h3"></path>
                </svg>
              </span>
              <span>售后申请</span>
            </a>
            <a href="#">
              <span class="service-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M6 7h9M6 12h7M6 17h5"></path>
                  <circle cx="17.5" cy="16.5" r="2.5"></circle>
                </svg>
              </span>
              <span>服务进度</span>
            </a>
            <a href="#">
              <span class="service-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M6.5 5.5h8a3 3 0 0 1 3 3v10h-8a3 3 0 0 1-3-3z"></path>
                  <path d="M9.5 10h5M9.5 13.5h5"></path>
                </svg>
              </span>
              <span>产品知识</span>
            </a>
            <a href="#">
              <span class="service-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M6 7.5h12v9H6z"></path>
                  <path d="M9 10.5h6M9 13.5h4M12 5v14"></path>
                </svg>
              </span>
              <span>维修价格</span>
            </a>
          </nav>

          <h2 class="section-title">更多服务</h2>
          <section class="cell-list" aria-label="更多服务">
            <a class="cell-row" href="#">
              <span class="cell-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M7 4.5h10l2 3v12H7z"></path>
                  <path d="M10 11h6M10 14.5h5M10 18h3"></path>
                </svg>
              </span>
              <span>申请开票</span>
            </a>
            <a class="cell-row" href="#">
              <span class="cell-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 4.5 18 7v5.4c0 3.6-2.4 5.9-6 7.1-3.6-1.2-6-3.5-6-7.1V7z"></path>
                  <path d="M9 12h6"></path>
                </svg>
              </span>
              <span>保修政策</span>
            </a>
          </section>
        </section>

        <div class="toast" role="status" aria-live="polite" data-toast></div>
      </section>
    </main>

    <script>
      const fallbackProducts = [
        { name: "净水器 X1", sn: "SN-OK-001", warranty: "2027-10-23", orderNo: "TB202607100001", channel: "淘宝", registeredAt: "2026-07-10", kind: "water" },
        { name: "焦点触控笔", sn: "SN-OK-002", warranty: "2026-12-07", orderNo: "JD202607100002", channel: "京东", registeredAt: "2026-07-10", kind: "stylus" },
        { name: "智能手环 S9", sn: "SN-OK-003", warranty: "2027-03-10", orderNo: "DY202607100003", channel: "抖音", registeredAt: "2026-07-10", kind: "band" },
        { name: "空气净化器 A3", sn: "SN-OK-004", warranty: "2028-01-18", orderNo: "PDD202607100004", channel: "拼多多", registeredAt: "2026-07-10", kind: "air" }
      ];

      const safeParse = (value) => {
        try {
          return JSON.parse(value || "[]");
        } catch {
          return [];
        }
      };

      const normalizeProduct = (product, index) => ({
        name: product.name || fallbackProducts[index]?.name || "已注册产品",
        sn: product.sn || fallbackProducts[index]?.sn || "SN-UNKNOWN",
        warranty: product.warranty || fallbackProducts[index]?.warranty || "2027-10-23",
        orderNo: product.orderNo || fallbackProducts[index]?.orderNo || "",
        channel: product.channel || fallbackProducts[index]?.channel || "",
        registeredAt: product.registeredAt || "2026-07-10",
        kind: inferProductKind(product, index)
      });

      const productAssets = {
        default: "./assets/product-water-purifier-real.png",
        water: "./assets/product-water-purifier-real.png",
        pen: "./assets/product-stylus-real.png",
        stylus: "./assets/product-stylus-real.png",
        band: "./assets/product-smart-band-real.png",
        air: "./assets/product-air-purifier-real.png"
      };
      const productThumb = (kind = "default") => `<img src="${productAssets[kind] || productAssets.default}" alt="" />`;
      const inferProductKind = (product, index) => {
        if (product.kind && product.kind !== "default") return product.kind;
        if (product.name?.includes("触控笔")) return "stylus";
        if (product.name?.includes("手环")) return "band";
        if (product.name?.includes("空气净化器")) return "air";
        return fallbackProducts[index]?.kind || product.kind || "water";
      };

      const dayDiff = (date) => {
        const start = new Date(`${date}T00:00:00`);
        if (Number.isNaN(start.getTime())) return 42;
        return Math.max(1, Math.round((Date.now() - start.getTime()) / 86400000));
      };

      const querySN = new URLSearchParams(location.search).get("sn");
      let products = safeParse(localStorage.getItem("aftersalesProducts")).map(normalizeProduct);
      if (!products.length) {
        products = fallbackProducts.map(normalizeProduct);
      }
      const fallbackProductList = fallbackProducts.map(normalizeProduct);
      const product = products.find((item) => item.sn === querySN) || fallbackProductList.find((item) => item.sn === querySN) || products[0];

      document.querySelector("[data-product-name]").textContent = product.name;
      document.querySelector("[data-product-days]").textContent = `已陪伴您 ${dayDiff(product.registeredAt)} 天`;
      document.querySelector("[data-product-sn]").textContent = product.sn;
      document.querySelector("[data-product-thumb]").innerHTML = productThumb(product.kind);
      document.querySelector("[data-warranty-date]").textContent = `保修期至 ${product.warranty}`;
      document.querySelector("[data-copy-sn]").textContent = product.sn;
      document.querySelector("[data-copy-order]").textContent = product.orderNo || "暂无";
      document.querySelector("[data-after-sales-link]").href = `./after-sales-form.html?sn=${encodeURIComponent(product.sn)}&from=detail`;

      const warrantyEnd = new Date(`${product.warranty}T23:59:59`);
      const expired = !Number.isNaN(warrantyEnd.getTime()) && warrantyEnd < new Date();
      document.querySelector("[data-warranty-status]").textContent = expired ? "已过保" : "保修中";

      const toast = document.querySelector("[data-toast]");
      let toastTimer;
      const showToast = (message) => {
        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("is-visible");
        toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 1600);
      };

      document.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.dataset.copy === "sn" ? product.sn : product.orderNo || "";
          if (navigator.clipboard && value) {
            navigator.clipboard.writeText(value).catch(() => {});
          }
          showToast("已复制");
        });
      });

      document.querySelector("[data-back]")?.addEventListener("click", (event) => {
        event.preventDefault();
        if (history.length > 1) {
          history.back();
        } else {
          location.href = "./products.html";
        }
      });
    </script>
  </body>
</html>
