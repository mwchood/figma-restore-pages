<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>售后小程序 - 首页</title>
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="miniapp-frame" aria-label="售后小程序首页">
        <header class="home-hero">
          <img src="./assets/home-service-banner.png" alt="" class="home-hero__image" />
          <div class="home-hero__shade"></div>

          <div class="status-bar" aria-hidden="true">
            <span class="status-bar__time">9:41</span>
            <span class="status-bar__signal"></span>
            <span class="status-bar__wifi"></span>
            <span class="status-bar__battery"></span>
          </div>

          <div class="mini-capsule" aria-hidden="true">
            <span></span>
            <span></span>
          </div>

          <div class="home-hero__copy">
            <h1>售后与支持</h1>
            <p>产品服务、进度查询、开票与知识指南</p>
          </div>
        </header>

        <section class="content">
          <section class="section-block product-section" aria-labelledby="product-title">
            <div class="section-heading">
              <h2 id="product-title">我的产品</h2>
              <a href="./products.html" aria-label="查看全部产品">查看全部产品</a>
            </div>

            <div class="product-carousel" data-product-list></div>
          </section>

          <section class="section-block service-section" aria-labelledby="service-title">
            <div class="section-heading">
              <h2 id="service-title">自助服务</h2>
            </div>

            <div class="service-grid">
              <a class="service-card service-card--accent" href="./after-sales.html">
                <span class="service-card__icon" aria-hidden="true">
                  <svg viewBox="0 0 28 28">
                    <path d="M7 6.5h14v15H7z"></path>
                    <path d="M10.5 11h7M10.5 15h7M10.5 19h4"></path>
                  </svg>
                </span>
                <span>
                  <strong>售后服务申请</strong>
                  <small>退换修/补寄</small>
                </span>
              </a>

              <a class="service-card" href="#">
                <span class="service-card__icon" aria-hidden="true">
                  <svg viewBox="0 0 28 28">
                    <path d="M7 7h14M7 14h14M7 21h9"></path>
                    <circle cx="22" cy="21" r="2.5"></circle>
                  </svg>
                </span>
                <span>
                  <strong>服务进度</strong>
                  <small>查看处理状态</small>
                </span>
              </a>

              <a class="service-card" href="#">
                <span class="service-card__icon" aria-hidden="true">
                  <svg viewBox="0 0 28 28">
                    <path d="M8 5.5h12l2 3v14H8z"></path>
                    <path d="M11 12h8M11 16h7M11 20h5"></path>
                  </svg>
                </span>
                <span>
                  <strong>申请开票</strong>
                  <small>订单发票服务</small>
                </span>
              </a>

              <a class="service-card" href="#">
                <span class="service-card__icon" aria-hidden="true">
                  <svg viewBox="0 0 28 28">
                    <path d="M7 6.5h10a4 4 0 0 1 4 4v11H11a4 4 0 0 1-4-4z"></path>
                    <path d="M11 12h6M11 16h6"></path>
                  </svg>
                </span>
                <span>
                  <strong>产品知识</strong>
                  <small>使用/保养指南</small>
                </span>
              </a>
            </div>
          </section>
        </section>

        <nav class="tabbar" aria-label="底部导航">
          <a class="tabbar__item is-active" href="#" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.8 10.7 12 4l8.2 6.7"></path>
              <path d="M5.7 9.7v8.6c0 1 .7 1.7 1.7 1.7h9.2c1 0 1.7-.7 1.7-1.7V9.7"></path>
            </svg>
            <span>首页</span>
          </a>
          <a class="tabbar__item" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 8.5h14v10.7c0 .9-.7 1.6-1.6 1.6H6.6c-.9 0-1.6-.7-1.6-1.6z"></path>
              <path d="M8.2 8.5V6.8A3.8 3.8 0 0 1 12 3a3.8 3.8 0 0 1 3.8 3.8v1.7"></path>
              <path d="M9 13.4h6"></path>
            </svg>
            <span>会员中心</span>
          </a>
          <a class="tabbar__item" href="./my.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="7.4" r="3.8"></circle>
              <path d="M4.8 20.5c.7-4 3.1-6 7.2-6s6.5 2 7.2 6"></path>
            </svg>
            <span>我的</span>
          </a>
          <span class="home-indicator" aria-hidden="true"></span>
        </nav>
      </section>
    </main>
    <script>
      const fallbackProducts = [
        { name: "净水器 X1", sn: "SN-OK-001", warranty: "2027-10-23", orderNo: "TB202607100001", channel: "淘宝", registeredAt: "2026-07-10", kind: "water" },
        { name: "焦点触控笔", sn: "SN-OK-002", warranty: "2026-12-07", orderNo: "JD202607100002", channel: "京东", registeredAt: "2026-07-10", kind: "stylus" }
      ];

      const safeParse = (value) => {
        try {
          return JSON.parse(value || "[]");
        } catch {
          return [];
        }
      };

      const escapeHTML = (value) =>
        String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);

      const shouldShowDemoProducts =
        new URLSearchParams(location.search).get("registered") === "1" ||
        localStorage.getItem("aftersalesProductRegistered") === "1";
      let products = safeParse(localStorage.getItem("aftersalesProducts"));

      if (!products.length && shouldShowDemoProducts) {
        products = fallbackProducts;
        localStorage.setItem("aftersalesProducts", JSON.stringify(products));
        localStorage.setItem("aftersalesProductRegistered", "1");
      }

      const productList = document.querySelector("[data-product-list]");
      const productAssets = {
        default: "./assets/product-water-purifier-real.png",
        water: "./assets/product-water-purifier-real.png",
        pen: "./assets/product-stylus-real.png",
        stylus: "./assets/product-stylus-real.png",
        band: "./assets/product-smart-band-real.png",
        air: "./assets/product-air-purifier-real.png"
      };
      const inferProductKind = (product) => {
        if (product.kind && product.kind !== "default") return product.kind;
        if (product.name?.includes("触控笔")) return "stylus";
        if (product.name?.includes("手环")) return "band";
        if (product.name?.includes("空气净化器")) return "air";
        return product.kind || "water";
      };
      const productAsset = (product) => productAssets[inferProductKind(product)] || productAssets.default;
      const productCard = (product) => `
        <a class="product-card product-card--registered" href="./product-detail.html?sn=${encodeURIComponent(product.sn)}" aria-label="${escapeHTML(product.name)}">
          <span class="registered-product__thumb" aria-hidden="true">
            <img src="${productAsset(product)}" alt="" />
          </span>
          <span class="registered-product__info">
            <strong>${escapeHTML(product.name)}</strong>
            <small>SN：${escapeHTML(product.sn)}</small>
            <small>保修期至：${escapeHTML(product.warranty)}</small>
          </span>
        </a>`;
      const addCard = `
        <a class="product-card product-card--empty product-card--add" href="./register-product.html" aria-label="注册产品">
          <span class="product-card__button">注册产品</span>
          <small>注册产品享受更多服务</small>
        </a>`;

      productList.classList.toggle("product-carousel--empty", products.length === 0);
      productList.innerHTML = products.map(productCard).join("") + addCard;

    </script>
  </body>
</html>
