<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .title { fill:#000; font-size:30px; font-weight:500; }
      .note { fill:#666; font-size:14px; font-weight:300; }
      .screen-title { fill:#000; font-size:16px; font-weight:500; }
      .label { fill:#000; font-size:13px; font-weight:400; }
      .muted { fill:#999; font-size:11px; font-weight:300; }
      .phone { fill:#fff; stroke:#dbdbdb; stroke-width:1.2; }
      .page { fill:#f9f9f9; }
      .bar { fill:#fff; }
      .card { fill:#fff; stroke:#f0f0f0; stroke-width:1; }
      .soft { fill:#f9f9f9; }
      .black { fill:#000; }
      .accent { fill:#ed6319; }
      .line { stroke:#999; stroke-width:1.5; marker-end:url(#arrow); }
      .dash { stroke:#d8d8d8; stroke-width:1; stroke-dasharray:5 5; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="#f9f9f9"/>
  <text x="56" y="58" class="title">售后申请页面流转线框图</text>
  <text x="56" y="88" class="note">低保真：商品申请和 SN 申请合并为同一页两个 Tab；视觉样式后续按 design-system-v2 落地。</text>

  <!-- Screen 1 -->
