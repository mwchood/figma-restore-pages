<svg xmlns="http://www.w3.org/2000/svg" width="980" height="980" viewBox="0 0 980 980">
  <defs>
    <style>
      .page { fill: #eef1f5; }
      .phone { fill: #fff; stroke: #cfd5dc; stroke-width: 1.5; }
      .screen { fill: #f9f9f9; }
      .top { fill: #e8edf2; }
      .card { fill: #fff; stroke: #dfe3e8; stroke-width: 1; }
      .soft { fill: #f4f6f8; stroke: #dfe3e8; stroke-width: 1; }
      .line { stroke: #ccd3da; stroke-width: 1; }
      .dark { fill: #111; font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mid { fill: #666; font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .light { fill: #999; font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .accent { fill: #ed6319; }
      .accent-stroke { fill: #fff7f2; stroke: #ed6319; stroke-width: 1; }
      .title { font-size: 24px; font-weight: 600; }
      .nav { font-size: 18px; font-weight: 600; }
      .h2 { font-size: 17px; font-weight: 600; }
      .body { font-size: 13px; font-weight: 400; }
      .small { font-size: 11px; font-weight: 400; }
      .tab { font-size: 11px; font-weight: 400; }
      .button-text { font-size: 13px; font-weight: 500; }
    </style>
  </defs>

  <rect class="page" width="980" height="980" rx="0"/>
  <text class="dark title" x="60" y="64">售后小程序首页线框图</text>
  <text class="mid body" x="60" y="92">底部 Tab：首页、会员中心、我的。首页包含我的产品与自助服务入口。</text>

  <!-- Left phone: product exists -->
  <g transform="translate(70 130)">
    <text class="dark h2" x="0" y="-22">首页状态 A：已有产品</text>
    <rect class="phone" x="0" y="0" width="375" height="812" rx="28"/>
    <clipPath id="clip-left">
      <rect x="0" y="0" width="375" height="812" rx="28"/>
    </clipPath>
    <g clip-path="url(#clip-left)">
      <rect class="screen" x="0" y="0" width="375" height="812"/>
      <rect class="top" x="0" y="0" width="375" height="150"/>
      <text class="dark small" x="24" y="30">9:41</text>
      <rect class="soft" x="286" y="18" width="64" height="24" rx="12"/>
      <text class="dark nav" x="24" y="86">首页</text>
      <text class="mid body" x="24" y="113">欢迎使用售后服务</text>

      <rect class="card" x="16" y="128" width="343" height="186" rx="10"/>
      <text class="dark h2" x="32" y="160">我的产品</text>
      <rect class="accent-stroke" x="267" y="141" width="76" height="30" rx="15"/>
      <text class="accent button-text" x="279" y="161">查看全部</text>

      <rect class="soft" x="32" y="184" width="92" height="86" rx="8"/>
      <rect class="line" x="51" y="205" width="54" height="34" rx="4"/>
      <text class="dark body" x="142" y="206">净水器 X1</text>
      <text class="light small" x="142" y="230">SN：A1B2C3D4</text>
      <text class="mid small" x="142" y="254">质保至：2027-10-23</text>
      <text class="dark h2" x="24" y="358">自助服务</text>
      <rect class="card" x="16" y="378" width="343" height="164" rx="10"/>
      <g transform="translate(34 402)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="accent" cx="32" cy="28" r="13"/>
        <text class="dark small" x="-3" y="89">售后服务申请</text>
      </g>
      <g transform="translate(116 402)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="dark" cx="32" cy="28" r="13"/>
        <text class="dark small" x="6" y="89">服务进度</text>
      </g>
      <g transform="translate(198 402)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="dark" cx="32" cy="28" r="13"/>
        <text class="dark small" x="6" y="89">申请开票</text>
      </g>
      <g transform="translate(280 402)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="dark" cx="32" cy="28" r="13"/>
        <text class="dark small" x="6" y="89">产品知识</text>
      </g>

      <rect class="card" x="16" y="566" width="343" height="98" rx="10"/>
      <text class="dark h2" x="32" y="598">常用入口</text>
      <text class="mid body" x="32" y="626">最近售后、开票记录、知识推荐等可扩展区域</text>

      <rect class="card" x="0" y="728" width="375" height="84" rx="0"/>
      <line class="line" x1="0" y1="728" x2="375" y2="728"/>
      <g transform="translate(42 746)">
        <circle class="accent" cx="24" cy="16" r="11"/>
        <text class="accent tab" x="13" y="48">首页</text>
      </g>
      <g transform="translate(154 746)">
        <circle class="light" cx="34" cy="16" r="11"/>
        <text class="light tab" x="7" y="48">会员中心</text>
      </g>
      <g transform="translate(286 746)">
        <circle class="light" cx="24" cy="16" r="11"/>
        <text class="light tab" x="13" y="48">我的</text>
      </g>
    </g>
  </g>

  <!-- Right phone: empty products -->
  <g transform="translate(535 130)">
    <text class="dark h2" x="0" y="-22">首页状态 B：暂无产品</text>
    <rect class="phone" x="0" y="0" width="375" height="812" rx="28"/>
    <clipPath id="clip-right">
      <rect x="0" y="0" width="375" height="812" rx="28"/>
    </clipPath>
    <g clip-path="url(#clip-right)">
      <rect class="screen" x="0" y="0" width="375" height="812"/>
      <rect class="top" x="0" y="0" width="375" height="150"/>
      <text class="dark small" x="24" y="30">9:41</text>
      <rect class="soft" x="286" y="18" width="64" height="24" rx="12"/>
      <text class="dark nav" x="24" y="86">首页</text>
      <text class="mid body" x="24" y="113">欢迎使用售后服务</text>

      <rect class="card" x="16" y="128" width="343" height="210" rx="10"/>
      <text class="dark h2" x="32" y="160">我的产品</text>
      <rect class="accent-stroke" x="267" y="141" width="76" height="30" rx="15"/>
      <text class="accent button-text" x="279" y="161">查看全部</text>

      <rect class="soft" x="139" y="186" width="96" height="62" rx="10"/>
      <line class="line" x1="156" y1="217" x2="218" y2="217"/>
      <line class="line" x1="187" y1="199" x2="187" y2="235"/>
      <text class="dark body" x="162" y="276">注册产品</text>
      <text class="light small" x="108" y="300">注册产品后可申请售后与查看服务进度</text>

      <text class="dark h2" x="24" y="382">自助服务</text>
      <rect class="card" x="16" y="402" width="343" height="164" rx="10"/>
      <g transform="translate(34 426)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="accent" cx="32" cy="28" r="13"/>
        <text class="dark small" x="-3" y="89">售后服务申请</text>
      </g>
      <g transform="translate(116 426)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="dark" cx="32" cy="28" r="13"/>
        <text class="dark small" x="6" y="89">服务进度</text>
      </g>
      <g transform="translate(198 426)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="dark" cx="32" cy="28" r="13"/>
        <text class="dark small" x="6" y="89">申请开票</text>
      </g>
      <g transform="translate(280 426)">
        <rect class="soft" x="0" y="0" width="64" height="64" rx="12"/>
        <circle class="dark" cx="32" cy="28" r="13"/>
        <text class="dark small" x="6" y="89">产品知识</text>
      </g>

      <rect class="card" x="16" y="590" width="343" height="74" rx="10"/>
      <text class="dark h2" x="32" y="622">服务提示</text>
      <text class="mid body" x="32" y="648">没有产品时，部分服务可引导先注册产品</text>

      <rect class="card" x="0" y="728" width="375" height="84" rx="0"/>
      <line class="line" x1="0" y1="728" x2="375" y2="728"/>
      <g transform="translate(42 746)">
        <circle class="accent" cx="24" cy="16" r="11"/>
        <text class="accent tab" x="13" y="48">首页</text>
      </g>
      <g transform="translate(154 746)">
        <circle class="light" cx="34" cy="16" r="11"/>
        <text class="light tab" x="7" y="48">会员中心</text>
      </g>
      <g transform="translate(286 746)">
        <circle class="light" cx="24" cy="16" r="11"/>
        <text class="light tab" x="13" y="48">我的</text>
      </g>
    </g>
  </g>
</svg>
