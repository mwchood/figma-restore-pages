<svg width="1320" height="2360" viewBox="0 0 1320 2360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#eef1f5; }
    .phone { fill:#f9f9f9; stroke:#d9dde3; stroke-width:1; }
    .bar { fill:#fff; }
    .card { fill:#fff; stroke:#d8d8d8; stroke-width:1; }
    .thumb { fill:#f2f3f5; stroke:#dbdbdb; stroke-width:1; }
    .line { stroke:#d8d8d8; stroke-width:1; }
    .dash { stroke:#c9c9c9; stroke-width:1; stroke-dasharray:5 5; }
    .pill { fill:#fff; stroke:#111; stroke-width:1; }
    .pillMuted { fill:#fff; stroke:#dbdbdb; stroke-width:1; }
    .btn { fill:#111; }
    .ink { fill:#111; }
    .muted { fill:#666; }
    .weak { fill:#999; }
    .white { fill:#fff; }
    .h1 { font:500 22px "PingFang SC","Microsoft YaHei",Arial,sans-serif; }
    .h2 { font:500 18px "PingFang SC","Microsoft YaHei",Arial,sans-serif; }
    .h3 { font:500 15px "PingFang SC","Microsoft YaHei",Arial,sans-serif; }
    .body { font:400 14px "PingFang SC","Microsoft YaHei",Arial,sans-serif; }
    .small { font:400 12px "PingFang SC","Microsoft YaHei",Arial,sans-serif; }
    .micro { font:400 10px "PingFang SC","Microsoft YaHei",Arial,sans-serif; }
  </style>

  <rect class="bg" width="1320" height="2360"/>
  <text class="h1 ink" x="56" y="50">全部产品列表页 / 产品详情页低保真方案</text>
  <text class="small muted" x="56" y="78">基于设计系统组件：Product Summary Card、Info List、More Function List、Bottom CTA Bar。以下只比较结构，不决定最终视觉。</text>

  <defs>
    <g id="chrome">
      <rect class="phone" x="0" y="0" width="300" height="650" rx="16"/>
      <rect class="bar" x="1" y="1" width="298" height="72" rx="16"/>
      <text class="micro ink" x="18" y="27">9:41</text>
      <path d="M24 50L17 57L24 64" stroke="#111" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="222" y="42" width="60" height="24" rx="12" fill="#f9f9f9" stroke="#f0f0f0"/>
      <circle cx="264" cy="54" r="7" stroke="#777" stroke-width="1.2"/>
      <circle cx="242" cy="54" r="1.6" fill="#777"/>
      <circle cx="248" cy="54" r="1.6" fill="#777"/>
      <circle cx="254" cy="54" r="1.6" fill="#777"/>
    </g>
    <g id="productThumb">
      <rect class="thumb" x="0" y="0" width="64" height="64" rx="6"/>
      <rect x="25" y="13" width="15" height="38" rx="6" fill="#e5e9ec" stroke="#cfd7dd"/>
      <line x1="29" y1="25" x2="36" y2="25" stroke="#999" stroke-width="1"/>
      <circle cx="32" cy="42" r="3" fill="#d6dde3"/>
    </g>
    <g id="penThumb">
      <rect class="thumb" x="0" y="0" width="64" height="64" rx="6"/>
      <path d="M27 12V52" stroke="#cfd7dd" stroke-width="5" stroke-linecap="round"/>
      <path d="M39 12V52" stroke="#cfd7dd" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g id="arrow">
      <path d="M0 0L5 5L0 10" stroke="#999" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Option A -->
  <g transform="translate(56 130)">
    <text class="h2 ink" x="0" y="0">方案 A：标准列表型</text>
    <text class="small muted" x="0" y="24">最稳妥，偏工具页。列表信息完整，详情用资料分组 + 服务列表。</text>

    <g transform="translate(0 56)">
      <use href="#chrome"/>
      <text class="h3 ink" x="111" y="58">全部产品</text>
      <text class="small muted" x="20" y="103">共 2 个产品</text>
      <text class="small ink" x="226" y="103">注册产品</text>
      <use href="#arrow" x="278" y="94"/>

      <g transform="translate(20 124)">
        <rect class="card" width="260" height="96" rx="6"/>
        <use href="#productThumb" x="14" y="16"/>
        <text class="body ink" x="92" y="34">净水器 X1</text>
        <text class="small weak" x="92" y="58">SN：SN-OK-001</text>
        <text class="small weak" x="92" y="78">保修期至：2027-10-23</text>
        <use href="#arrow" x="236" y="43"/>
      </g>
      <g transform="translate(20 236)">
        <rect class="card" width="260" height="96" rx="6"/>
        <use href="#penThumb" x="14" y="16"/>
        <text class="body ink" x="92" y="34">焦点触控笔</text>
        <text class="small weak" x="92" y="58">SN：SN-OK-002</text>
        <text class="small weak" x="92" y="78">保修期至：2026-12-07</text>
        <use href="#arrow" x="236" y="43"/>
      </g>
      <g transform="translate(20 360)">
        <rect class="card" width="260" height="84" rx="6"/>
        <text class="body ink" x="100" y="34">注册产品</text>
        <text class="small weak" x="73" y="58">绑定后享受更多服务</text>
      </g>
      <text class="micro weak" x="20" y="606">空状态：仅显示注册产品卡。</text>
    </g>

    <g transform="translate(340 56)">
      <use href="#chrome"/>
      <text class="h3 ink" x="111" y="58">产品详情</text>

      <g transform="translate(20 96)">
        <rect class="card" width="260" height="112" rx="6"/>
        <use href="#productThumb" x="16" y="24"/>
        <text class="h3 ink" x="96" y="36">净水器 X1</text>
        <text class="small weak" x="96" y="60">SN：SN-OK-001</text>
        <text class="small weak" x="96" y="82">保修期至：2027-10-23</text>
      </g>
      <text class="h3 ink" x="20" y="242">产品资料</text>
      <rect class="card" x="20" y="258" width="260" height="168" rx="6"/>
      <text class="small muted" x="36" y="292">购买渠道</text><text class="small ink" x="225" y="292">淘宝</text>
      <line class="line" x1="36" y1="312" x2="264" y2="312"/>
      <text class="small muted" x="36" y="340">订单号</text><text class="small ink" x="160" y="340">TB202607100001</text>
      <line class="line" x1="36" y1="360" x2="264" y2="360"/>
      <text class="small muted" x="36" y="388">注册时间</text><text class="small ink" x="184" y="388">2026-07-10</text>
      <line class="line" x1="36" y1="408" x2="264" y2="408"/>
      <text class="small muted" x="36" y="434">保修状态</text><text class="small ink" x="224" y="434">保修中</text>

      <text class="h3 ink" x="20" y="462">产品服务</text>
      <rect class="card" x="20" y="478" width="260" height="116" rx="6"/>
      <text class="small ink" x="36" y="508">售后服务申请</text><use href="#arrow" x="252" y="500"/>
      <line class="line" x1="36" y1="528" x2="264" y2="528"/>
      <text class="small ink" x="36" y="556">售后服务记录</text><use href="#arrow" x="252" y="548"/>
      <line class="line" x1="36" y1="576" x2="264" y2="576"/>
      <text class="small ink" x="36" y="604">产品知识</text><use href="#arrow" x="252" y="596"/>

      <rect class="bar" x="0" y="576" width="300" height="74"/>
      <rect class="btn" x="20" y="586" width="260" height="44" rx="22"/>
      <text class="body white" x="104" y="614">申请售后服务</text>
    </g>

    <g transform="translate(706 92)">
      <rect class="card" width="474" height="138" rx="6"/>
      <text class="h3 ink" x="18" y="34">适合场景</text>
      <text class="small muted" x="18" y="62">产品数量不多，但每个产品都需要展示完整 SN / 保修信息。</text>
      <text class="small muted" x="18" y="86">优点：清楚、稳、好实现。</text>
      <text class="small muted" x="18" y="110">风险：详情页服务入口不够突出。</text>
    </g>
  </g>

  <!-- Option B -->
  <g transform="translate(56 870)">
    <text class="h2 ink" x="0" y="0">方案 B：产品资产型</text>
    <text class="small muted" x="0" y="24">更强调“我拥有的产品资产”。列表有筛选/统计，详情先突出保修资产。</text>

    <g transform="translate(0 56)">
      <use href="#chrome"/>
      <text class="h3 ink" x="111" y="58">全部产品</text>

      <rect class="card" x="20" y="96" width="260" height="78" rx="6"/>
      <text class="small muted" x="36" y="124">已绑定产品</text>
      <text class="h2 ink" x="36" y="154">2</text>
      <text class="small weak" x="62" y="154">个</text>
      <rect class="pill" x="188" y="118" width="76" height="30" rx="15"/>
      <text class="small ink" x="205" y="138">注册产品</text>

      <g transform="translate(20 194)">
        <rect class="pill" width="68" height="30" rx="15"/>
        <text class="small ink" x="22" y="20">全部</text>
        <rect class="pillMuted" x="78" width="76" height="30" rx="15"/>
        <text class="small weak" x="100" y="20">保修中</text>
        <rect class="pillMuted" x="164" width="76" height="30" rx="15"/>
        <text class="small weak" x="186" y="20">已过保</text>
      </g>

      <g transform="translate(20 246)">
        <rect class="card" width="260" height="118" rx="6"/>
        <use href="#productThumb" x="16" y="18"/>
        <text class="body ink" x="96" y="38">净水器 X1</text>
        <text class="small weak" x="96" y="62">保修期至：2027-10-23</text>
        <text class="small weak" x="96" y="84">SN：SN-OK-001</text>
        <rect class="pillMuted" x="188" y="82" width="56" height="22" rx="11"/>
        <text class="micro ink" x="201" y="97">保修中</text>
      </g>
      <g transform="translate(20 380)">
        <rect class="card" width="260" height="118" rx="6"/>
        <use href="#penThumb" x="16" y="18"/>
        <text class="body ink" x="96" y="38">焦点触控笔</text>
        <text class="small weak" x="96" y="62">已于 2025-12-07 过保</text>
        <text class="small weak" x="96" y="84">SN：SN-OK-002</text>
        <rect class="pillMuted" x="188" y="82" width="56" height="22" rx="11"/>
        <text class="micro weak" x="201" y="97">已过保</text>
      </g>
    </g>

    <g transform="translate(340 56)">
      <use href="#chrome"/>
      <text class="h3 ink" x="111" y="58">产品详情</text>

      <rect class="card" x="20" y="96" width="260" height="158" rx="6"/>
      <use href="#productThumb" x="98" y="22"/>
      <text class="h3 ink" x="106" y="108">净水器 X1</text>
      <text class="small weak" x="88" y="132">SN：SN-OK-001</text>
      <line class="dash" x1="20" y1="270" x2="280" y2="270"/>
      <rect class="card" x="20" y="286" width="260" height="86" rx="6"/>
      <text class="small muted" x="36" y="318">保修资产</text>
      <text class="h3 ink" x="36" y="346">保修中</text>
      <text class="small weak" x="122" y="346">至 2027-10-23</text>

      <text class="h3 ink" x="20" y="408">快捷服务</text>
      <g transform="translate(20 424)">
        <rect class="card" width="124" height="76" rx="6"/>
        <text class="small ink" x="20" y="34">申请售后</text>
        <text class="micro weak" x="20" y="54">维修/换货</text>
        <rect class="card" x="136" width="124" height="76" rx="6"/>
        <text class="small ink" x="156" y="34">服务记录</text>
        <text class="micro weak" x="156" y="54">查看进度</text>
      </g>

      <rect class="card" x="20" y="524" width="260" height="82" rx="6"/>
      <text class="small ink" x="36" y="558">产品资料</text><use href="#arrow" x="252" y="550"/>
      <line class="line" x1="36" y1="578" x2="264" y2="578"/>
      <text class="small ink" x="36" y="602">产品知识</text><use href="#arrow" x="252" y="594"/>
    </g>

    <g transform="translate(706 92)">
      <rect class="card" width="474" height="138" rx="6"/>
      <text class="h3 ink" x="18" y="34">适合场景</text>
      <text class="small muted" x="18" y="62">未来产品较多，需要按保修状态、产品资产做管理。</text>
      <text class="small muted" x="18" y="86">优点：资产感强，详情页更有重点。</text>
      <text class="small muted" x="18" y="110">风险：比 A 多一层统计/筛选，需要确认是否真的需要。</text>
    </g>
  </g>

  <!-- Option C -->
  <g transform="translate(56 1610)">
    <text class="h2 ink" x="0" y="0">方案 C：服务优先型</text>
    <text class="small muted" x="0" y="24">产品是入口，核心目标是快速发起售后、查记录。适合售后小程序主业务。</text>

    <g transform="translate(0 56)">
      <use href="#chrome"/>
      <text class="h3 ink" x="111" y="58">全部产品</text>
      <rect class="card" x="20" y="96" width="260" height="44" rx="6"/>
      <text class="small weak" x="40" y="124">搜索产品名 / SN</text>

      <g transform="translate(20 160)">
        <rect class="card" width="260" height="124" rx="6"/>
        <use href="#productThumb" x="16" y="18"/>
        <text class="body ink" x="96" y="38">净水器 X1</text>
        <text class="small weak" x="96" y="62">SN：SN-OK-001</text>
        <line class="line" x1="16" y1="88" x2="244" y2="88"/>
        <text class="small ink" x="36" y="110">申请售后</text>
        <text class="small weak" x="142" y="110">服务记录</text>
      </g>
      <g transform="translate(20 302)">
        <rect class="card" width="260" height="124" rx="6"/>
        <use href="#penThumb" x="16" y="18"/>
        <text class="body ink" x="96" y="38">焦点触控笔</text>
        <text class="small weak" x="96" y="62">SN：SN-OK-002</text>
        <line class="line" x1="16" y1="88" x2="244" y2="88"/>
        <text class="small ink" x="36" y="110">申请售后</text>
        <text class="small weak" x="142" y="110">服务记录</text>
      </g>
      <rect class="btn" x="20" y="548" width="260" height="44" rx="22"/>
      <text class="body white" x="118" y="576">注册产品</text>
    </g>

    <g transform="translate(340 56)">
      <use href="#chrome"/>
      <text class="h3 ink" x="111" y="58">产品详情</text>
      <g transform="translate(20 96)">
        <rect class="card" width="260" height="96" rx="6"/>
        <use href="#productThumb" x="16" y="16"/>
        <text class="body ink" x="96" y="36">净水器 X1</text>
        <text class="small weak" x="96" y="60">SN：SN-OK-001</text>
        <text class="small weak" x="96" y="80">保修期至：2027-10-23</text>
      </g>

      <text class="h3 ink" x="20" y="226">你可以做</text>
      <rect class="btn" x="20" y="242" width="260" height="44" rx="22"/>
      <text class="body white" x="104" y="270">申请售后服务</text>
      <g transform="translate(20 308)">
        <rect class="card" width="124" height="74" rx="6"/>
        <text class="small ink" x="22" y="34">服务记录</text>
        <text class="micro weak" x="22" y="54">查看处理状态</text>
        <rect class="card" x="136" width="124" height="74" rx="6"/>
        <text class="small ink" x="158" y="34">申请开票</text>
        <text class="micro weak" x="158" y="54">订单发票</text>
      </g>
      <rect class="card" x="20" y="404" width="260" height="124" rx="6"/>
      <text class="small ink" x="36" y="438">产品资料</text><use href="#arrow" x="252" y="430"/>
      <line class="line" x1="36" y1="458" x2="264" y2="458"/>
      <text class="small ink" x="36" y="486">产品知识</text><use href="#arrow" x="252" y="478"/>
      <line class="line" x1="36" y1="506" x2="264" y2="506"/>
      <text class="small ink" x="36" y="534">查看订单号/SN</text><use href="#arrow" x="252" y="526"/>
    </g>

    <g transform="translate(706 92)">
      <rect class="card" width="474" height="138" rx="6"/>
      <text class="h3 ink" x="18" y="34">适合场景</text>
      <text class="small muted" x="18" y="62">售后链路比产品管理更重要，用户进来主要是办事。</text>
      <text class="small muted" x="18" y="86">优点：服务动作更短，转化路径清晰。</text>
      <text class="small muted" x="18" y="110">风险：列表页信息密度更高，需要控制按钮数量。</text>
    </g>
  </g>
</svg>
