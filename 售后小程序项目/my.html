<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>售后小程序 - 我的</title>
    <link rel="stylesheet" href="./my.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="miniapp-frame" aria-label="售后小程序我的页面">
        <header class="my-header">
          <div class="status-bar" aria-hidden="true">
            <span class="status-bar__time">9:41</span>
            <span class="status-bar__signal"></span>
            <span class="status-bar__wifi"></span>
            <span class="status-bar__battery"></span>
          </div>

          <div class="mini-capsule" aria-hidden="true">
            <span></span>
            <span></span>
          </div>

          <a class="profile-entry" href="#" aria-label="登录或注册">
            <span class="profile-entry__avatar" aria-hidden="true">
              <svg viewBox="0 0 60 60">
                <circle cx="30" cy="30" r="29"></circle>
                <circle cx="30" cy="24" r="9"></circle>
                <path d="M14 50c3.2-11.5 10-17 16-17s12.8 5.5 16 17"></path>
              </svg>
            </span>
            <strong>登录 / 注册</strong>
            <span class="profile-entry__arrow" aria-hidden="true"></span>
          </a>
        </header>

        <section class="my-content">
          <section class="cell-group" aria-label="产品与服务">
            <a class="cell" href="./products.html">
              <span class="cell__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <rect x="7" y="4" width="10" height="16" rx="3"></rect>
                  <path d="M10 9h4M10 13h4"></path>
                  <circle cx="12" cy="17" r="1"></circle>
                </svg>
              </span>
              <span>我的产品</span>
              <span class="cell__arrow" aria-hidden="true"></span>
            </a>
            <a class="cell" href="#">
              <span class="cell__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M7 4.5h10v15H7z"></path>
                  <path d="M10 9h5M10 12.5h5M10 16h3"></path>
                </svg>
              </span>
              <span>售后服务记录</span>
              <span class="cell__arrow" aria-hidden="true"></span>
            </a>
            <a class="cell" href="#">
              <span class="cell__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 20s6-5.1 6-10a6 6 0 0 0-12 0c0 4.9 6 10 6 10z"></path>
                  <circle cx="12" cy="10" r="2"></circle>
                </svg>
              </span>
              <span>地址管理</span>
              <span class="cell__arrow" aria-hidden="true"></span>
            </a>
          </section>

          <section class="cell-group cell-group--legal" aria-label="协议与隐私">
            <a class="cell" href="#">
              <span class="cell__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M7 4.5h8l2 2v13H7z"></path>
                  <path d="M15 4.5v3h3M10 11h5M10 14.5h5"></path>
                </svg>
              </span>
              <span>用户服务协议</span>
              <span class="cell__arrow" aria-hidden="true"></span>
            </a>
            <a class="cell" href="#">
              <span class="cell__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 4.5 18 7v5.4c0 3.6-2.4 5.9-6 7.1-3.6-1.2-6-3.5-6-7.1V7z"></path>
                  <path d="m9.5 12 1.7 1.7 3.4-4"></path>
                </svg>
              </span>
              <span>隐私政策</span>
              <span class="cell__arrow" aria-hidden="true"></span>
            </a>
          </section>
        </section>

        <nav class="tabbar" aria-label="底部导航">
          <a class="tabbar__item" href="./index.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.8 10.7 12 4l8.2 6.7"></path>
              <path d="M5.7 9.7v8.6c0 1 .7 1.7 1.7 1.7h9.2c1 0 1.7-.7 1.7-1.7V9.7"></path>
            </svg>
            <span>首页</span>
          </a>
          <a class="tabbar__item" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 8.5h14v10.7c0 .9-.7 1.6-1.6 1.6H6.6c-.9 0-1.6-.7-1.6-1.6z"></path>
              <path d="M8.2 8.5V6.8A3.8 3.8 0 0 1 12 3a3.8 3.8 0 0 1 3.8 3.8v1.7"></path>
              <path d="M9 13.4h6"></path>
            </svg>
            <span>会员中心</span>
          </a>
          <a class="tabbar__item is-active" href="./my.html" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="7.4" r="3.8"></circle>
              <path d="M4.8 20.5c.7-4 3.1-6 7.2-6s6.5 2 7.2 6"></path>
            </svg>
            <span>我的</span>
          </a>
          <span class="home-indicator" aria-hidden="true"></span>
        </nav>
      </section>
    </main>
  </body>
</html>
