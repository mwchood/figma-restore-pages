<svg xmlns="http://www.w3.org/2000/svg" width="520" height="980" viewBox="0 0 520 980">
  <defs>
    <style>
      .canvas{fill:#e7ebf0}
      .phone{fill:#111;filter:url(#shadow)}
      .screen{fill:#f9f9f9}
      .white{fill:#fff}
      .soft{fill:#f9f9f9}
      .ink{fill:#000;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .gray{fill:#666;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .muted{fill:#999;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .inverse{fill:#fff;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .accent{fill:#ed6319}
      .h1{font-size:22px;font-weight:500}
      .h2{font-size:18px;font-weight:500}
      .h3{font-size:14px;font-weight:400}
      .body{font-size:14px;font-weight:300}
      .small{font-size:12px;font-weight:300}
      .micro{font-size:10px;font-weight:300}
      .stroke{stroke:#000;stroke-width:1.25;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .strokeG{stroke:#999;stroke-width:1.15;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .strokeO{stroke:#ed6319;stroke-width:1.25;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .line{stroke:#f0f0f0;stroke-width:1}
    </style>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#1d2632" flood-opacity=".18"/>
    </filter>
    <linearGradient id="productDevice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".55" stop-color="#edf1f4"/>
      <stop offset="1" stop-color="#cfd7de"/>
    </linearGradient>
    <clipPath id="phoneClip"><rect x="0" y="0" width="375" height="812" rx="28"/></clipPath>
  </defs>

  <rect class="canvas" width="520" height="980"/>
  <text class="ink h2" x="60" y="58">售后首页方案：结构参考版</text>
  <text class="gray small" x="60" y="82">结构参考你给的图；视觉按 design-system-v2。</text>

  <g transform="translate(72 118)">
    <rect class="phone" x="-8" y="-8" width="391" height="828" rx="34"/>
    <g clip-path="url(#phoneClip)">
      <rect class="screen" width="375" height="812"/>

      <!-- Banner: structure from reference, visual from service page asset -->
      <g>
        <image href="assets/home-service-banner.png" x="0" y="0" width="375" height="230" preserveAspectRatio="xMidYMid slice"/>
        <text class="inverse small" x="22" y="31" font-weight="600">9:41</text>
        <rect x="280" y="50" width="74" height="32" rx="16" fill="#fff" opacity=".25"/>
        <circle cx="303" cy="66" r="3" fill="#fff"/>
        <circle cx="316" cy="66" r="3" fill="#fff"/>
        <circle cx="329" cy="66" r="3" fill="#fff"/>
        <circle cx="343" cy="66" r="8" fill="none" stroke="#fff" stroke-width="1.4"/>
        <text class="inverse h1" x="22" y="132">售后与支持</text>
        <text class="inverse body" x="22" y="162">产品服务、维修进度、开票与知识指南</text>
      </g>

      <!-- My product: large horizontal card like reference, DS card style -->
      <g transform="translate(0 230)">
        <rect class="screen" x="0" y="0" width="375" height="216"/>
        <text class="ink h1" x="20" y="50">我的产品</text>
        <text class="gray body" x="273" y="49">全部产品</text>
        <path d="M342 39l5 5-5 5" class="strokeG"/>
        <rect class="white" x="20" y="76" width="335" height="116" rx="6"/>
        <g transform="translate(40 94)">
          <rect class="soft" x="0" y="0" width="88" height="78" rx="5.333"/>
          <ellipse cx="44" cy="63" rx="30" ry="8" fill="#e3e7eb"/>
          <rect x="29" y="12" width="30" height="48" rx="12" fill="url(#productDevice)" stroke="#cfd7dd"/>
          <path d="M38 24h12M38 32h12" stroke="#c3cbd2" stroke-width="2" stroke-linecap="round"/>
          <circle cx="44" cy="46" r="6" fill="#d0d8df"/>
        </g>
        <text class="ink h2" x="148" y="120">净水器 X1</text>
        <text class="gray body" x="148" y="148">质保至：2027-10-23</text>
        <text class="muted small" x="148" y="174">SN：A1B2C3D4</text>
      </g>

      <!-- Self service: 2x2 structure from reference, DS color/icon style -->
      <g transform="translate(0 446)">
        <rect class="screen" x="0" y="0" width="375" height="278"/>
        <text class="ink h1" x="20" y="48">自助服务</text>

        <g transform="translate(20 76)">
          <rect class="white" x="0" y="0" width="160" height="72" rx="6"/>
          <circle cx="34" cy="36" r="18" fill="#ffebdd"/>
          <path d="M27 31h14M27 37h14M27 43h9" class="strokeO"/>
          <text class="ink h3" x="68" y="32">售后服务申请</text>
          <text class="muted micro" x="68" y="52">退换修/补寄</text>
        </g>

        <g transform="translate(195 76)">
          <rect class="white" x="0" y="0" width="160" height="72" rx="6"/>
          <circle cx="34" cy="36" r="18" fill="#f9f9f9"/>
          <path d="M27 30h12M27 37h17M27 44h10" class="stroke"/>
          <text class="ink h3" x="68" y="32">服务进度</text>
          <text class="muted micro" x="68" y="52">查看处理状态</text>
        </g>

        <g transform="translate(20 166)">
          <rect class="white" x="0" y="0" width="160" height="72" rx="6"/>
          <circle cx="34" cy="36" r="18" fill="#f9f9f9"/>
          <path d="M27 25h18v22H27zM31 32h10M31 39h8" class="stroke"/>
          <text class="ink h3" x="68" y="32">申请开票</text>
          <text class="muted micro" x="68" y="52">订单发票服务</text>
        </g>

        <g transform="translate(195 166)">
          <rect class="white" x="0" y="0" width="160" height="72" rx="6"/>
          <circle cx="34" cy="36" r="18" fill="#f9f9f9"/>
          <path d="M27 27h13c3 0 5 2 5 5v15H32c-3 0-5-2-5-5zM32 34h8M32 41h8" class="stroke"/>
          <text class="ink h3" x="68" y="32">产品知识</text>
          <text class="muted micro" x="68" y="52">使用/保养指南</text>
        </g>
      </g>

      <!-- Bottom tabbar -->
      <g transform="translate(0 724)">
        <rect class="white" width="375" height="88"/>
        <line class="line" x1="0" y1="0" x2="375" y2="0"/>
        <path d="M61 36V25l12-9 12 9v11c0 2-1 3-3 3H64c-2 0-3-1-3-3z" class="stroke"/>
        <text class="ink micro" x="63" y="66">首页</text>
        <circle cx="188" cy="27" r="10" class="strokeG"/>
        <text class="muted micro" x="168" y="66">会员中心</text>
        <circle cx="312" cy="24" r="5" class="strokeG"/>
        <path d="M302 40c1-7 19-7 20 0" class="strokeG"/>
        <text class="muted micro" x="302" y="66">我的</text>
        <rect x="121" y="78" width="134" height="5" rx="3" fill="#000"/>
      </g>
    </g>
  </g>
</svg>
