<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Custom Cooking Time</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section
        class="figma-frame typhur-custom-time-frame"
        data-figma-id="97:11112"
        data-figma-frame-width="750"
        data-figma-frame-height="1720"
        data-render-scale="0.5"
        data-figma-name="Custom"
      >
        <section class="custom-time-systembar" data-figma-id="97:11113" data-figma-name="System bar">
          <img class="custom-time-status-time" data-figma-id="97:11133" src="./assets/typhur-custom-status-time-97-11133.svg" alt="" />
          <img class="custom-time-status-right" data-figma-id="97:11116" src="./assets/typhur-custom-status-right-97-11116.svg" alt="" />
        </section>

        <header class="custom-time-nav" data-figma-id="97:11135" data-figma-name="Navigation bar/Light">
          <img class="custom-time-back" data-figma-id="I97:11135;473:3480" src="./assets/typhur-custom-arrow-back-97-11135.svg" alt="" />
          <h1 data-figma-id="I97:11135;466:3427">Custom</h1>
        </header>

        <section class="custom-time-name" data-figma-id="97:11157" data-figma-name="Name">
          <h2 data-figma-id="97:11159">Name</h2>
          <div class="custom-time-input" data-figma-id="97:11161" data-figma-name="Frame">
            <p data-figma-id="97:11162">Name Your Cooking</p>
          </div>
        </section>

        <section class="custom-time-ingredients" data-figma-id="97:11136" data-figma-name="Ingredients">
          <h2 data-figma-id="97:11137">Main Ingredient</h2>
          <div class="custom-time-grid" data-figma-id="97:11138">
            <article class="custom-time-card selected" data-figma-id="97:11139" data-figma-name="Ingredient_selceted">
              <img src="./assets/typhur-custom-steak-97-11139.svg" alt="" />
              <span>Beef</span>
            </article>
            <article class="custom-time-card icon-missing" data-figma-id="97:11140" data-figma-name="Ingredient_default">
              <span>Pork</span>
            </article>
            <article class="custom-time-card icon-missing" data-figma-id="97:11141" data-figma-name="Ingredient_default">
              <span>Seafood</span>
            </article>
            <article class="custom-time-card icon-missing" data-figma-id="97:11142" data-figma-name="Ingredient_default">
              <span>Poultry</span>
            </article>
            <article class="custom-time-card icon-missing" data-figma-id="97:11143" data-figma-name="Ingredient_default">
              <span>Eggs</span>
            </article>
            <article class="custom-time-card" data-figma-id="97:11144" data-figma-name="Ingredient_default">
              <img src="./assets/typhur-custom-dessert-97-11144.svg" alt="" />
              <span>Desserts</span>
            </article>
            <article class="custom-time-card" data-figma-id="97:11145" data-figma-name="Ingredient_default">
              <img src="./assets/typhur-custom-vegetable-97-11145.svg" alt="" />
              <span>Veggies</span>
            </article>
            <article class="custom-time-card" data-figma-id="97:11146" data-figma-name="Ingredient_default">
              <img src="./assets/typhur-custom-dish-97-11146.svg" alt="" />
              <span>Other</span>
            </article>
          </div>
        </section>

        <h2 class="custom-time-param-title" data-figma-id="97:11147">Parameters</h2>
        <section class="custom-time-list" data-figma-id="97:11148" data-figma-name="List">
          <article data-figma-id="97:11149" data-figma-name="Text">
            <span>Target Temp</span>
            <strong>--</strong>
            <img src="./assets/typhur-custom-arrow-forward-97-11149.svg" alt="" />
          </article>
          <article data-figma-id="97:11150" data-figma-name="Text">
            <span>Cooking Time</span>
            <strong>--</strong>
            <img src="./assets/typhur-custom-arrow-forward-97-11149.svg" alt="" />
          </article>
        </section>

        <section class="custom-time-note" data-figma-id="97:11152">
          <h2 data-figma-id="97:11153">Note</h2>
          <div class="custom-time-textarea" data-figma-id="97:11154" data-figma-name="Text fields">
            <p data-figma-id="97:11155">Please enter the details of your cooking</p>
            <span data-figma-id="97:11156">0 / 500</span>
          </div>
        </section>

        <button class="custom-time-save" type="button" data-figma-id="97:11151">Save</button>

        <div class="custom-time-dim" data-figma-id="97:11163"></div>

        <section class="custom-time-sheet" data-figma-id="97:11164" data-figma-name="Bottom sheet">
          <div class="custom-time-sheet-indicator" data-figma-id="97:11165" data-figma-name="Indicator">
            <span data-figma-id="97:11166"></span>
          </div>
          <h2 data-figma-id="97:11187">Set Cooking Time</h2>

          <section class="custom-time-picker" data-figma-id="97:11167" data-figma-name="Time">
            <div class="custom-time-picker-highlight" data-figma-id="97:11168" data-figma-name="Background"></div>
            <div class="custom-time-picker-col custom-time-hour-up">
              <span class="faint" data-figma-id="97:11178">01</span>
              <span class="muted" data-figma-id="97:11179">02</span>
            </div>
            <div class="custom-time-picker-col custom-time-hour-down">
              <span class="muted" data-figma-id="97:11172">04</span>
              <span class="faint" data-figma-id="97:11173">05</span>
            </div>
            <div class="custom-time-picker-value custom-time-hour-selected">
              <strong data-figma-id="97:11169">03</strong><span data-figma-id="97:11183">hr</span>
            </div>
            <div class="custom-time-picker-col custom-time-minute-up">
              <span class="faint" data-figma-id="97:11175">28</span>
              <span class="muted" data-figma-id="97:11176">29</span>
            </div>
            <div class="custom-time-picker-col custom-time-minute-down">
              <span class="muted" data-figma-id="97:11181">31</span>
              <span class="faint" data-figma-id="97:11182">32</span>
            </div>
            <div class="custom-time-picker-value custom-time-minute-selected">
              <strong data-figma-id="97:11170">30</strong><span data-figma-id="97:11184">min</span>
            </div>
          </section>

          <button class="custom-time-cancel" type="button" data-figma-id="97:11185">Cancel</button>
          <button class="custom-time-set" type="button" data-figma-id="97:11186">Set</button>
        </section>
      </section>
    </main>
  </body>
</html>
