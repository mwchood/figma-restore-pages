      <section class="restore-hub-preview" aria-live="polite">
        <header class="restore-hub-preview-header">
          <h2 id="restoreHubTitle">我的 V1</h2>
          <a id="restoreHubOpen" href="./sy-v1.html" target="_blank" rel="noreferrer">打开页面</a>
        </header>
        <iframe id="restoreHubFrame" title="我的 V1" src="./sy-v1.html"></iframe>
      </section>
    </main>

    <script>
      const buttons = Array.from(document.querySelectorAll(".restore-page-button"));
      const frame = document.getElementById("restoreHubFrame");
      const title = document.getElementById("restoreHubTitle");
      const openLink = document.getElementById("restoreHubOpen");

      function selectPage(button, replaceHash = false) {
        buttons.forEach((item) => item.classList.toggle("active", item === button));
        const page = button.dataset.page;
        const pageTitle = button.dataset.title;
        frame.src = `./${page}`;
        frame.title = pageTitle;
        title.textContent = pageTitle;
        openLink.href = `./${page}`;
        if (!replaceHash) window.location.hash = page;
      }

      const initialPage = decodeURIComponent(window.location.hash.replace(/^#/, ""));
      const initialButton = buttons.find((button) => button.dataset.page === initialPage) || buttons[0];
      selectPage(initialButton, true);

      buttons.forEach((button) => {
        button.addEventListener("click", () => selectPage(button));
      });
    </script>
  </body>
