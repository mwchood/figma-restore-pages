<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Temperature Alerts</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section
        class="figma-frame typhur-alerts-temp-frame"
        data-figma-id="91:10443"
        data-figma-frame-width="750"
        data-figma-frame-height="1624"
        data-render-scale="0.5"
        data-figma-name="Alerts"
      >
        <section class="alerts-temp-systembar" data-figma-id="91:10444" data-figma-name="System bar">
          <img class="alerts-temp-time" data-figma-id="91:10464" src="./assets/typhur-alerts-temp-status-time-91-10444.svg" alt="" />
          <img class="alerts-temp-status-right" data-figma-id="91:10447" src="./assets/typhur-alerts-temp-status-right-91-10444.svg" alt="" />
        </section>

        <header class="alerts-temp-page-nav" data-figma-id="91:10466" data-figma-name="Navigation bar/Light">
          <img class="alerts-temp-back" data-figma-id="I91:10466;473:3480" src="./assets/typhur-alerts-temp-back-91-10466.svg" alt="" />
          <h1 data-figma-id="I91:10466;466:3427">Alerts</h1>
          <img class="alerts-temp-nav-plus" data-figma-id="I91:10466;473:3489" src="./assets/typhur-alerts-temp-nav-plus-91-10466.svg" alt="" />
        </header>

        <div class="alerts-temp-dim" data-figma-id="91:10467"></div>

        <section class="alerts-temp-sheet" data-figma-id="91:10468" data-figma-name="Bottom sheet">
          <header class="alerts-temp-sheet-head" data-figma-id="91:10495" data-figma-name="Head">
            <img class="alerts-temp-close" data-figma-id="91:10497" src="./assets/typhur-alerts-temp-close-91-10497.svg" alt="" />
            <h2 data-figma-id="91:10496">Edit Alerts</h2>
            <button type="button" data-figma-id="91:10499">Done</button>
          </header>

          <p class="alerts-temp-copy" data-figma-id="91:10470">Alert me when ambient temperature rises above...</p>

          <section class="alerts-temp-control" data-figma-id="91:10481">
            <img class="alerts-temp-minus" data-figma-id="91:10489" src="./assets/typhur-alerts-temp-minus-91-10489.svg" alt="" />
            <div class="alerts-temp-value">
              <strong data-figma-id="91:10482">105</strong><span data-figma-id="91:10483">°F</span>
            </div>
            <img class="alerts-temp-plus" data-figma-id="91:10492" src="./assets/typhur-alerts-temp-plus-91-10492.svg" alt="" />

            <div class="alerts-temp-track" data-figma-id="91:10484"></div>
            <div class="alerts-temp-fill" data-figma-id="91:10485"></div>
            <img class="alerts-temp-knob" data-figma-id="91:10486" src="./assets/typhur-alerts-temp-knob-91-10486.svg" alt="" />

            <span class="alerts-temp-min-label" data-figma-id="91:10488">32°F</span>
            <span class="alerts-temp-max-label" data-figma-id="91:10487">194°F</span>
          </section>

          <div class="alerts-temp-divider" data-figma-id="91:10480" data-figma-name="Divider"></div>

          <section class="alerts-temp-notes" data-figma-id="91:10474" data-figma-name="Name">
            <h3 data-figma-id="91:10476">Notes (Optional)</h3>
            <div class="alerts-temp-field" data-figma-id="91:10478" data-figma-name="Input">
              <p data-figma-id="91:10479">Probe 1 Cooking Complete</p>
            </div>
          </section>

          <section class="alerts-temp-home" data-figma-id="91:10472" data-figma-name="Home indicator">
            <span data-figma-id="91:10473" data-figma-name="Home Indicator"></span>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
