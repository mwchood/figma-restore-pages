<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Test Professional</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section
        class="figma-frame typhur-test-professional-frame"
        data-figma-id="15:1859"
        data-figma-file-key="H9GTGgnI0rzfnrKSt1Hlui"
        data-figma-frame-width="750"
        data-figma-frame-height="1624"
        data-render-scale="0.5"
        data-figma-name="Professional"
      >
        <section class="ty-prof-status" data-figma-id="15:1860" data-figma-name="StatusBar">
          <img class="ty-prof-time" src="./assets/typhur-prof-status-time-15-1860.svg" alt="" />
          <img class="ty-prof-status-right" src="./assets/typhur-prof-status-right-15-1860.svg" alt="" />
        </section>

        <header class="ty-prof-nav" data-figma-id="15:1861" data-figma-name="Navigation bar/Light">
          <img class="ty-prof-back" src="./assets/typhur-prof-back-15-1861.svg" alt="" />
          <h1>Probe 1</h1>
          <p>Device Name - MU4A</p>
          <img class="ty-prof-edit" src="./assets/typhur-prof-edit-15-1861.svg" alt="" />
          <img class="ty-prof-switch" src="./assets/typhur-prof-switch-15-1861.svg" alt="" />
        </header>

        <img class="ty-prof-scrollbar" data-figma-id="15:1862" src="./assets/typhur-prof-scrollbar-15-1862.svg" alt="" />

        <section class="ty-prof-notify" data-figma-id="15:1865" data-figma-name="Notify">
          <img src="./assets/typhur-prof-wifi-15-1867.svg" alt="" />
          <p>Connect your base to the Internet to keep track of temperatures.</p>
        </section>

        <h2 class="ty-prof-title" data-figma-id="15:1891">Cooking</h2>
        <img class="ty-prof-battery" data-figma-id="15:1892" src="./assets/typhur-prof-battery-15-1892.svg" alt="" />
        <p class="ty-prof-recipe" data-figma-id="15:1898">Rib Roast Medium Rare</p>

        <img class="ty-prof-sensors" data-figma-id="15:1899" src="./assets/typhur-prof-sensors-15-1899.svg" alt="" />
        <img class="ty-prof-chart" data-figma-id="15:1938" src="./assets/typhur-prof-chart-15-1938.svg" alt="" />

        <section class="ty-prof-card" data-figma-id="15:1877" data-figma-name="Card">
          <p class="ty-prof-current" data-figma-id="15:1878">132.9<span data-figma-id="15:1879">°F</span></p>
          <img class="ty-prof-alerts" data-figma-id="15:1888" src="./assets/typhur-prof-alerts-15-1888.svg" alt="" />
          <div class="ty-prof-stat target"><span>Target</span><strong>102.5°F</strong></div>
          <div class="ty-prof-stat ambient"><span>Ambient</span><strong>245.5°F</strong></div>
          <div class="ty-prof-stat remaining"><span>Remaining</span><strong>45min</strong></div>
          <div class="ty-prof-stat duration"><span>Cook Duration</span><strong>1hr 30min</strong></div>
        </section>

        <footer class="ty-prof-bottom" data-figma-id="15:1934" data-figma-name="Bottom">
          <button class="ty-prof-button edit" type="button" data-figma-id="15:1937">Edit</button>
          <button class="ty-prof-button stop" type="button" data-figma-id="15:1936">Stop</button>
        </footer>
      </section>
    </main>
  </body>
</html>
