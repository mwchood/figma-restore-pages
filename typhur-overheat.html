<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Probe Overheat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="figma-frame typhur-frame typhur-overheat-frame" data-figma-id="83:9987" data-figma-frame-width="750" data-figma-frame-height="1624" data-render-scale="0.5" data-figma-name="Overheat">
        <div class="overheat-top-glow" data-figma-id="83:9988"></div>
        <div class="overheat-bottom-glow" data-figma-id="83:10004"></div>

        <section class="overheat-status" data-figma-id="83:9990" data-figma-name="StatusBar">
          <img class="overheat-time ty-figma-svg" data-figma-id="I83:9990;6944:69314" src="./assets/typhur-overheat-status-time-83-9990.svg" alt="" />
          <img class="overheat-status-right ty-figma-svg" data-figma-id="I83:9990;6944:69297" src="./assets/typhur-overheat-status-right-83-9990.svg" alt="" />
        </section>

        <header class="overheat-nav" data-figma-id="83:9991" data-figma-name="Navigation bar/Light">
          <img class="overheat-close ty-figma-svg" data-figma-id="I83:9991;473:3480" src="./assets/typhur-overheat-close-83-9991.svg" alt="" />
        </header>

        <section class="overheat-device-tabs">
          <button class="selected" data-figma-id="83:10043" type="button">Maximum device name..</button>
          <button data-figma-id="83:10045" type="button">Typhur Sync</button>
          <button class="ghost" data-figma-id="83:10047" type="button">Typhur Sync&trade;</button>
        </section>

        <section class="overheat-content" data-figma-id="83:9992" data-figma-name="Content">
          <img class="overheat-error ty-figma-svg" data-figma-id="83:9993" src="./assets/typhur-overheat-error-83-9993.svg" alt="" />
          <h1 data-figma-id="83:9999">Probe 1 Overheat</h1>
          <p data-figma-id="83:10000">Please detach the probe from the heat source and wait until it cools down to the normal temperature range!</p>
        </section>

        <section class="overheat-probe" aria-label="Probe status">
          <div class="overheat-badge" data-figma-id="83:10001">
            <img class="ty-figma-svg" data-figma-id="83:10002" src="./assets/typhur-overheat-badge-dot-83-10002.svg" alt="" />
            <span data-figma-id="83:10003">1</span>
          </div>

          <div class="overheat-temp-row top">
            <span class="t1" data-figma-id="83:10012"><em>T1</em>132.91&deg;</span>
            <span class="t3" data-figma-id="83:10015"><em>T3</em>132.91&deg;</span>
            <span class="t5 active" data-figma-id="83:10018"><em>T5</em>132.91&deg;</span>
            <span class="ambient" data-figma-id="83:10021"><em>Ambient</em>132.91&deg;</span>
          </div>

          <img class="overheat-probe-body ty-figma-svg" data-figma-id="83:10007" src="./assets/typhur-overheat-probe-body-83-10007.svg" alt="" />

          <span class="probe-line l1" data-figma-id="83:10030"></span>
          <span class="probe-line l2" data-figma-id="83:10031"></span>
          <span class="probe-line l3" data-figma-id="83:10032"></span>
          <span class="probe-line l4" data-figma-id="83:10033"></span>
          <span class="probe-line l5" data-figma-id="83:10034"></span>
          <span class="probe-line l6" data-figma-id="83:10035"></span>

          <img class="probe-dot d1 ty-figma-svg" data-figma-id="83:10036" src="./assets/typhur-overheat-probe-dot-muted-83-10036.svg" alt="" />
          <img class="probe-dot d2 ty-figma-svg" data-figma-id="83:10037" src="./assets/typhur-overheat-probe-dot-muted-83-10036.svg" alt="" />
          <img class="probe-dot d3 active ty-figma-svg" data-figma-id="83:10038" src="./assets/typhur-overheat-probe-dot-active-83-10038.svg" alt="" />
          <img class="probe-dot d4 ty-figma-svg" data-figma-id="83:10039" src="./assets/typhur-overheat-probe-dot-muted-83-10036.svg" alt="" />
          <img class="probe-dot d5 ty-figma-svg" data-figma-id="83:10040" src="./assets/typhur-overheat-probe-dot-muted-83-10036.svg" alt="" />
          <img class="probe-dot d6 ty-figma-svg" data-figma-id="83:10041" src="./assets/typhur-overheat-probe-dot-muted-83-10036.svg" alt="" />
          <img class="probe-marker ty-figma-svg" data-figma-id="83:10042" src="./assets/typhur-overheat-probe-marker-83-10042.svg" alt="" />

          <div class="overheat-temp-row bottom">
            <span class="t2" data-figma-id="83:10024"><em>T2</em>132.91&deg;</span>
            <span class="t4" data-figma-id="83:10027"><em>T4</em>132.91&deg;</span>
          </div>
        </section>

        <section class="overheat-home" data-figma-id="83:10005" data-figma-name="Home indicator">
          <span data-figma-id="83:10006"></span>
        </section>
      </section>
    </main>
  </body>
</html>
