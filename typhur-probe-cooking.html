<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Probe Cooking</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="figma-frame typhur-frame typhur-probe-frame" data-figma-id="80:9847" data-figma-frame-width="750" data-figma-frame-height="1624" data-render-scale="0.5" data-figma-name="Cooking">
        <section class="probe-status" data-figma-id="80:9848" data-figma-name="StatusBar">
          <img class="probe-time ty-figma-svg" data-figma-id="I80:9848;6944:69314" src="./assets/typhur-probe-status-time-80-9848.svg" alt="" />
          <img class="probe-status-right ty-figma-svg" data-figma-id="I80:9848;6944:69297" src="./assets/typhur-probe-status-right-80-9848.svg" alt="" />
        </section>

        <header class="probe-nav" data-figma-id="80:9940" data-figma-name="Navigation bar/Light">
          <img class="probe-nav-back ty-figma-svg" data-figma-id="I80:9940;1724:30" src="./assets/typhur-probe-nav-back-80-9940.svg" alt="" />
          <h1 data-figma-id="I80:9940;1724:36">Probe 1</h1>
          <p data-figma-id="I80:9940;1724:37">Device Name - MU4A</p>
          <img class="probe-nav-edit ty-figma-svg" data-figma-id="I80:9940;2878:46" src="./assets/typhur-probe-nav-edit-80-9940.svg" alt="" />
          <img class="probe-nav-switch ty-figma-svg" data-figma-id="I80:9940;1724:31" src="./assets/typhur-probe-nav-switch-80-9940.svg" alt="" />
        </header>

        <img class="probe-scrollbar ty-figma-svg" data-figma-id="80:9909" src="./assets/typhur-probe-scrollbar-80-9909.svg" alt="" />

        <section class="probe-heading">
          <h2 data-figma-id="80:9859">Remove From Heat</h2>
          <img class="probe-info ty-figma-svg" data-figma-id="80:9860" src="./assets/typhur-probe-info-80-9860.svg" alt="" />
          <img class="probe-battery ty-figma-svg" data-figma-id="80:9864" src="./assets/typhur-probe-battery-80-9864.svg" alt="" />
          <p data-figma-id="80:9870">Rib Roast Medium Rare</p>
        </section>

        <section class="probe-legend" data-figma-id="80:9849" data-figma-name="Instruction">
          <span data-figma-id="80:9850"><img data-figma-id="80:9851" src="./assets/typhur-probe-legend-internal-80-9851.svg" alt="" />Internal</span>
          <span data-figma-id="80:9853"><img data-figma-id="80:9854" src="./assets/typhur-probe-legend-target-80-9854.svg" alt="" />Target</span>
          <span data-figma-id="80:9856"><img data-figma-id="80:9857" src="./assets/typhur-probe-legend-ambient-80-9857.svg" alt="" />Ambient</span>
        </section>

        <img class="probe-chart ty-figma-svg" data-figma-id="80:9871" src="./assets/typhur-probe-chart-80-9871.svg" alt="" />

        <section class="probe-card" data-figma-id="80:9912" data-figma-name="Card">
          <img class="probe-alerts ty-figma-svg" data-figma-id="80:9913" src="./assets/typhur-probe-alerts-80-9913.svg" alt="" />
          <p class="probe-current" data-figma-id="80:9930">132.9<span data-figma-id="80:9931">°F</span></p>
          <div class="probe-stat target">
            <span data-figma-id="80:9933">Target</span>
            <strong data-figma-id="80:9934">138°F</strong>
          </div>
          <div class="probe-stat ambient">
            <span data-figma-id="80:9939">Ambient</span>
            <strong data-figma-id="80:9932">245.5°F</strong>
          </div>
          <div class="probe-stat remaining">
            <span data-figma-id="80:9935">Remaining</span>
            <strong data-figma-id="80:9936">-</strong>
          </div>
          <div class="probe-stat elapsed">
            <span data-figma-id="80:9937">Elapsed</span>
            <strong data-figma-id="80:9938">1hr 30min</strong>
          </div>
        </section>

        <button class="probe-button remove" data-figma-id="80:9907" type="button">Remove From Heat</button>
        <button class="probe-button stop" data-figma-id="80:9908" type="button">Stop</button>
      </section>
    </main>
  </body>
</html>
