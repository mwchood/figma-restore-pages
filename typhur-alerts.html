<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Alerts</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section class="figma-frame typhur-frame typhur-alerts-frame" data-figma-id="85:10368" data-figma-frame-width="750" data-figma-frame-height="1624" data-render-scale="0.5" data-figma-name="Alerts">
        <section class="alerts-systembar" data-figma-id="85:10369" data-figma-name="System bar">
          <img class="alerts-time ty-figma-svg" data-figma-id="85:10389" src="./assets/typhur-alerts-status-time-85-10369.svg" alt="" />
          <img class="alerts-status-right ty-figma-svg" data-figma-id="85:10372" src="./assets/typhur-alerts-status-right-85-10369.svg" alt="" />
        </section>

        <header class="alerts-page-nav" data-figma-id="85:10391" data-figma-name="Navigation bar/Light">
          <img class="alerts-back ty-figma-svg" data-figma-id="I85:10391;473:3480" src="./assets/typhur-alerts-back-85-10391.svg" alt="" />
          <h1 data-figma-id="I85:10391;466:3427">Alerts</h1>
          <img class="alerts-plus ty-figma-svg" data-figma-id="I85:10391;473:3489" src="./assets/typhur-alerts-plus-85-10391.svg" alt="" />
        </header>

        <div class="alerts-dim" data-figma-id="85:10392"></div>

        <section class="alerts-sheet" data-figma-id="85:10393" data-figma-name="Bottom sheet">
          <header class="alerts-sheet-head" data-figma-id="85:10396" data-figma-name="Head">
            <img class="alerts-close ty-figma-svg" data-figma-id="85:10398" src="./assets/typhur-alerts-close-85-10398.svg" alt="" />
            <h2 data-figma-id="85:10397">Add Alerts</h2>
            <button type="button" data-figma-id="85:10411">Add</button>
          </header>

          <p class="alerts-copy" data-figma-id="85:10395">Alert me ...min before the cook ends</p>

          <section class="alerts-picker" data-figma-id="85:10412" data-figma-name="Time">
            <div class="picker-highlight" data-figma-id="85:10413"></div>
            <div class="picker-col hours">
              <span class="faint">01</span>
              <span class="muted">02</span>
              <strong>03</strong>
              <span class="muted">03</span>
              <span class="faint">03</span>
            </div>
            <span class="picker-unit hr" data-figma-id="85:10428">hr</span>
            <div class="picker-col minutes">
              <span class="faint">28</span>
              <span class="muted">29</span>
              <strong>30</strong>
              <span class="muted">31</span>
              <span class="faint">32</span>
            </div>
            <span class="picker-unit min" data-figma-id="85:10429">min</span>
          </section>

          <div class="alerts-divider" data-figma-id="85:10409"></div>

          <section class="alerts-notes" data-figma-id="85:10402" data-figma-name="Name">
            <h3 data-figma-id="85:10404">Notes (Optional)</h3>
            <div class="alerts-field" data-figma-id="85:10406">
              <p data-figma-id="85:10407">Probe 1 Cooking Complete</p>
            </div>
          </section>

          <section class="alerts-home" data-figma-id="85:10400" data-figma-name="Home indicator">
            <span data-figma-id="85:10401"></span>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
