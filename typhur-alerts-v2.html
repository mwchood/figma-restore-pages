<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typhur Alerts V2</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-shell">
      <section
        class="figma-frame typhur-alerts-v2-frame"
        data-figma-id="85:10368"
        data-figma-frame-width="750"
        data-figma-frame-height="1624"
        data-render-scale="0.5"
        data-figma-name="Alerts"
      >
        <section class="alerts-v2-systembar" data-figma-id="85:10369" data-figma-name="System bar">
          <img class="alerts-v2-time" data-figma-id="85:10389" src="./assets/typhur-alerts-v2-status-time-85-10369.svg" alt="" />
          <img class="alerts-v2-status-right" data-figma-id="85:10372" src="./assets/typhur-alerts-v2-status-right-85-10369.svg" alt="" />
        </section>

        <header class="alerts-v2-page-nav" data-figma-id="85:10391" data-figma-name="Navigation bar/Light">
          <img class="alerts-v2-back" data-figma-id="I85:10391;473:3480" src="./assets/typhur-alerts-v2-back-85-10391.svg" alt="" />
          <h1 data-figma-id="I85:10391;466:3427">Alerts</h1>
          <img class="alerts-v2-plus" data-figma-id="I85:10391;473:3489" src="./assets/typhur-alerts-v2-plus-85-10391.svg" alt="" />
        </header>

        <div class="alerts-v2-dim" data-figma-id="85:10392"></div>

        <section class="alerts-v2-sheet" data-figma-id="85:10393" data-figma-name="Bottom sheet">
          <header class="alerts-v2-sheet-head" data-figma-id="85:10396" data-figma-name="Head">
            <img class="alerts-v2-close" data-figma-id="85:10398" src="./assets/typhur-alerts-v2-close-85-10398.svg" alt="" />
            <h2 data-figma-id="85:10397">Add Alerts</h2>
            <button type="button" data-figma-id="85:10411">Add</button>
          </header>

          <p class="alerts-v2-copy" data-figma-id="85:10395">Alert me ...min before the cook ends</p>

          <section class="alerts-v2-picker" data-figma-id="85:10412" data-figma-name="Time">
            <div class="alerts-v2-picker-highlight" data-figma-id="85:10413"></div>

            <div class="alerts-v2-picker-col alerts-v2-picker-hour-up" aria-hidden="true">
              <span class="faint" data-figma-id="85:10419">01</span>
              <span class="muted" data-figma-id="85:10420">02</span>
            </div>
            <div class="alerts-v2-picker-col alerts-v2-picker-hour-down" aria-hidden="true">
              <span class="muted" data-figma-id="85:10416">03</span>
              <span class="faint" data-figma-id="85:10417">03</span>
            </div>

            <div class="alerts-v2-picker-value alerts-v2-hour-selected">
              <strong data-figma-id="85:10414">03</strong><span data-figma-id="85:10428">hr</span>
            </div>

            <div class="alerts-v2-picker-col alerts-v2-picker-minute-up" aria-hidden="true">
              <span class="faint" data-figma-id="85:10422">28</span>
              <span class="muted" data-figma-id="85:10423">29</span>
            </div>
            <div class="alerts-v2-picker-col alerts-v2-picker-minute-down" aria-hidden="true">
              <span class="muted" data-figma-id="85:10425">31</span>
              <span class="faint" data-figma-id="85:10426">32</span>
            </div>

            <div class="alerts-v2-picker-value alerts-v2-minute-selected">
              <strong data-figma-id="85:10427">30</strong><span data-figma-id="85:10429">min</span>
            </div>
          </section>

          <div class="alerts-v2-divider" data-figma-id="85:10409" data-figma-name="Divider"></div>

          <section class="alerts-v2-notes" data-figma-id="85:10402" data-figma-name="Name">
            <h3 data-figma-id="85:10404">Notes (Optional)</h3>
            <div class="alerts-v2-field" data-figma-id="85:10406" data-figma-name="Text Field">
              <p data-figma-id="85:10407">Probe 1Cooking Complete</p>
            </div>
          </section>

          <section class="alerts-v2-home" data-figma-id="85:10400" data-figma-name="Home indicator">
            <span data-figma-id="85:10401" data-figma-name="Home Indicator"></span>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
